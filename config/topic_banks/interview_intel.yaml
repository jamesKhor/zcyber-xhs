# Tone: like a friend who just came out of the interview telling you everything
# Highest save rate of any career content format — readers screenshot and keep forever

topics:

  # ── SINGAPORE (7 entries) ──────────────────────────────────────────────────

  - slug: dbs-sg-security-engineer-interview
    company: DBS Bank
    role: Security Engineer
    market: Singapore
    rounds: 3
    real_questions:
      - "我们的网银系统最近出现了一个 OAuth token 没有正确失效的 bug，你会怎么排查和修复？"
      - "描述一次你发现安全漏洞并向非技术团队解释严重性的经历"
      - "如果你在代码审查中发现一个 SQL 注入风险，但修复成本高且上线时间紧，你会怎么做？"
      - "DBS 在新加坡和印度都有大型工程团队，跨时区的安全事件响应你怎么协调？"
      - "MAS TRM 2021 对金融机构有哪些关键网络安全要求？"
    what_they_want: "银行安全工程师不是纯技术岗——面试官在看你能不能在业务压力下做风险判断。他们要看你懂 MAS 监管框架、能和开发团队沟通风险、又不会每个 bug 都喊「必须立刻停止发布」。"
    bad_answer_example: "说「我会直接拒绝发布，安全不能妥协」——听起来原则性强，但暴露了你不懂风险量化和业务优先级权衡，银行安全工程师必须能谈补偿控制和缓解措施。"
    good_answer_angle: "展示你会用 CVSS 评分量化风险，提出短期缓解方案（如 WAF 规则），争取时间做彻底修复，并记录决策过程——这才是银行想要的安全思维。"
    salary_range: "SGD 90,000–120,000/年；高级工程师可达 SGD 140k+；含奖金和 RSU"
    required_certs: ["CISSP", "CEH", "AWS Security Specialty"]
    hook: "星展银行面试真题曝光"
    shocking_fact: "DBS 安全工程师面试第二轮会模拟真实事件响应场景，给你一份「脱敏的」安全事件日志，要求你现场分析并写 RCA——没见过这种格式的候选人往往当场卡住。"
    category: singapore_interview

  - slug: govtech-sg-soc-analyst-interview
    company: GovTech Singapore
    role: SOC Analyst
    market: Singapore
    rounds: 2
    real_questions:
      - "你收到一条 SIEM 告警：某个内部 IP 在非工作时间向外部 IP 大量发送 DNS 请求，你的调查步骤是什么？"
      - "区分误报和真实威胁，你的判断逻辑是什么？给一个具体例子。"
      - "你熟悉 MITRE ATT&CK 框架吗？举一个你用它映射告警的实际例子。"
      - "新加坡政府系统和私营企业系统的安全架构有哪些关键差异？"
      - "如果你发现一个同事的账号在异常时间登录了敏感系统，你会怎么处理？"
    what_they_want: "GovTech 的 SOC 面试官在测试你处理「灰色警报」的判断力——不是找一个只会升级所有告警的人，而是能区分噪声和真实威胁、有系统性调查思路的分析师。政府背景还需要你理解数据分类和正式上报流程。"
    bad_answer_example: "回答「我会立刻封锁那个 IP」——在政府环境中，任何行动都需要先调查、取证、走审批流程，单方面封锁可能中断关键政府服务，这个答案暴露了你缺乏政府环境操作经验。"
    good_answer_angle: "描述你的调查顺序：被动观察 → 数据收集 → 威胁情报比对 → 形成假设 → 上报给主管决策。强调「不做未经授权的行动」在政府环境中比速度更重要。"
    salary_range: "SGD 65,000–85,000/年；含政府福利（医疗、年金）；总补偿比市场略低但工作稳定"
    required_certs: ["CompTIA Security+", "CySA+", "GCIA"]
    hook: "新加坡政府SOC面试内幕"
    shocking_fact: "GovTech 的面试只有 2 轮，但第一轮是技术笔试，包含真实告警日志分析题——很多人以为政府机构面试「稳」，结果在笔试就被淘汰了。"
    category: singapore_interview

  - slug: grab-sg-appsec-interview
    company: Grab
    role: Application Security Engineer
    market: Singapore
    rounds: 4
    real_questions:
      - "Review 这段 Go 代码（给你看一段 Grab 风格的微服务代码），找出所有安全问题并按严重程度排序。"
      - "Grab 的骑手端 app 和用户端 app 共享一个 API gateway，你如何设计权限模型防止越权访问？"
      - "描述一次你在 CI/CD 流水线中集成安全扫描工具的经历，遇到了什么阻力？"
      - "我们正在引入新的第三方 SDK，你的供应链安全审查流程是什么？"
      - "解释 SSRF 的原理，以及在 Grab 这样有大量内部微服务的环境中为什么特别危险。"
    what_they_want: "Grab 要找的不是「安全警察」，而是能嵌入开发团队工作流的安全工程师。他们在评估你能不能用开发者语言沟通风险、能不能设计开发者愿意用的安全工具、而不是只会说「这个不安全，不能上」。"
    bad_answer_example: "在代码审查题中只找到一个 SQL 注入然后停下来——Grab 面试官期望你在 10 分钟内找出 5-8 个问题，包括逻辑漏洞、权限设计问题和信息泄露。只找显而易见的漏洞说明你的 AppSec 深度不够。"
    good_answer_angle: "展示系统性的代码审查清单思维：输入验证 → 认证授权 → 加密传输 → 日志敏感信息 → 依赖安全 → 业务逻辑。把发现整理成报告格式而不是口头描述。"
    salary_range: "SGD 100,000–130,000/年；含股票（ESOP）；总补偿可达 SGD 160k+"
    required_certs: ["OSCP", "BSCP (Burp Suite Certified Practitioner)", "GWEB"]
    hook: "Grab应聘安全工程师被问啥"
    shocking_fact: "Grab 的第 4 轮面试是文化和价值观面试，但面试官会问你「描述一次你和工程师发生分歧并最终妥协的经历」——很多安全工程师在这里失分，因为他们的答案是「我坚持了安全标准，对方最后接受了」，Grab 想看的是真正的协作，不是谁赢了。"
    category: singapore_interview

  - slug: ensign-sg-pentest-interview
    company: Ensign InfoSecurity
    role: Penetration Tester
    market: Singapore
    rounds: 3
    real_questions:
      - "给你一个目标域名，描述你的外部侦察（OSINT）流程，你会用哪些工具和数据源？"
      - "你在渗透测试中发现了一个严重漏洞，但客户的修复时间窗口只有 3 小时，你会怎么写报告？"
      - "解释 Kerberoasting 攻击原理，以及在实际 AD 环境中如何检测和缓解。"
      - "你做过哪些不依赖自动化工具的手动渗透测试？给一个例子。"
      - "客户说「上次测试公司给我们的报告什么问题都没找到」，你怎么回应？"
    what_they_want: "Ensign 是新加坡本地最大的网安公司之一，服务大量政府和关键基础设施客户。他们要的不是只会跑 Metasploit 的工具人，而是能写高质量报告、能向高管解释风险、又具备真实手动测试能力的综合型渗透测试员。"
    bad_answer_example: "描述你的渗透测试流程时只提自动化工具（Nmap、Nessus、Burp Suite 自动扫描）——Ensign 面试官会直接追问「如果这些工具全部被防火墙拦截，你怎么办？」没有手动技巧的候选人在这里会完全卡住。"
    good_answer_angle: "强调方法论而不是工具：侦察 → 漏洞识别 → 漏洞利用 → 后渗透 → 报告，每个阶段都说出 2-3 个不依赖工具的手动技术。提到你如何让报告让 CTO 和 CISO 都能读懂。"
    salary_range: "SGD 75,000–100,000/年；高级渗透测试员可达 SGD 120k；含项目奖金"
    required_certs: ["OSCP", "PNPT", "CRTO"]
    hook: "新加坡最大安全公司面试关卡"
    shocking_fact: "Ensign 面试第二轮是实战靶场测试，给你一个内网环境，2 小时内必须拿到 Domain Admin——没做过 HackTheBox Pro Labs 或 TryHackMe 企业靶场的候选人直接在这轮出局。"
    category: singapore_interview

  - slug: big4-sg-grc-consultant-interview
    company: "Big 4 (PwC / Deloitte)"
    role: GRC Consultant
    market: Singapore
    rounds: 3
    real_questions:
      - "一家金融机构的 ISO 27001 审计中，你发现他们的 BCP 文件已经 3 年没更新，你如何评定这个发现的风险等级并建议行动？"
      - "MAS TRM 和 MAS CSF 有什么区别？什么类型的机构需要遵守哪个？"
      - "你如何向一个完全不懂技术的 CFO 解释为什么他们需要为安全意识培训投入预算？"
      - "如果客户的高管对你的审计发现提出异议，你怎么处理？"
      - "描述一次你在短时间内交付一份高质量合规报告的经历。"
    what_they_want: "四大 GRC 咨询岗考的是「顾问思维」：能不能把技术风险翻译成业务语言、能不能在模糊情况下快速做判断、能不能管理客户关系压力。技术知识是基线，但沟通和结构化思维才是差异点。"
    bad_answer_example: "用「我们会修复所有漏洞」这类答案回答风险评定问题——四大面试官想看你用 likelihood × impact 矩阵量化风险，给出具体的风险等级（高/中/低）和缓解建议，而不是含糊的承诺。"
    good_answer_angle: "用麦肯锡式结构（问题 → 影响 → 建议 → 实施路径）回答所有案例题。展示你能把 MAS 法规要求映射到具体控制措施，并用商业语言表达。"
    salary_range: "SGD 65,000–90,000/年（初级顾问）；高级经理可达 SGD 130k+；含绩效奖金"
    required_certs: ["CISA", "CISSP", "ISO 27001 Lead Auditor"]
    hook: "四大GRC顾问面试怎么过"
    shocking_fact: "PwC 新加坡的 GRC 岗有约 40% 的候选人在 HR 电话筛选就被淘汰——原因不是技术不够，而是没研究过 MAS TRM 2021，电话里回答不出「MAS 对金融机构的网络安全要求有哪三个关键领域」这种基础题。"
    category: singapore_interview

  - slug: sea-group-sg-security-interview
    company: "Sea Group (Shopee / Garena)"
    role: Security Engineer
    market: Singapore
    rounds: 4
    real_questions:
      - "Shopee 在东南亚多个国家运营，如何设计一个跨区域的统一身份认证系统，同时符合各国数据本地化法规？"
      - "我们的游戏平台（Garena）发现有人用 BOT 刷游戏内货币，从安全工程师角度你会设计什么反制方案？"
      - "描述你设计或审查过的最复杂的授权模型，你遇到了什么边界案例？"
      - "在高速增长的产品团队中，你如何确保安全不成为发布瓶颈？"
      - "解释 JWT 的常见安全配置错误，以及如何在 code review 中发现这些问题。"
    what_they_want: "Sea Group 的安全团队规模大但人均产出要求极高——他们要的安全工程师能在超高速产品迭代环境中，同时处理 Web、Mobile 和游戏三个不同安全问题域。他们特别看重你能不能设计可扩展的安全方案，而不是逐个处理漏洞。"
    bad_answer_example: "在 BOT 反制题中只回答「加 CAPTCHA 和限流」——Sea 面试官想看系统性思维：行为分析、设备指纹、账户风控、实时异常检测、对抗对手的升级策略。只说基础防御方案说明你没见过工业级对抗场景。"
    good_answer_angle: "展示你能从攻击者视角设计防御：「如果我是攻击者，我会绕过 X，所以我在设计 Y 的时候同时加了 Z」。这种思维模式在 Sea 的面试中得分很高。"
    salary_range: "SGD 100,000–140,000/年；含 RSU（限制性股票单位）；总补偿 Top 10% 可超 SGD 200k"
    required_certs: ["OSCP", "AWS Security Specialty", "BSCP"]
    hook: "Shopee母公司安全岗到底考什么"
    shocking_fact: "Sea Group 的 4 轮面试中第 3 轮是系统设计——但不是普通的系统设计，是「安全系统设计」，你需要在白板上画出一个完整的安全架构，包括威胁建模、控制措施和监控方案。很多纯技术背景的候选人从来没做过这种「大图」思维练习。"
    category: singapore_interview

  - slug: mas-sg-technology-risk-interview
    company: "MAS (Monetary Authority of Singapore)"
    role: Technology Risk Examiner
    market: Singapore
    rounds: 3
    real_questions:
      - "一家持牌支付机构声称他们的渗透测试已「通过」，但测试是他们自己的内部团队做的，你如何评价这个声明的可信度？"
      - "MAS 科技风险管理框架（TRM）2021 版对云外包有哪些具体要求？"
      - "你被分配审查一家小型数字银行的网络安全状况，你的审查计划如何制定？从哪里开始？"
      - "如果你在审查中发现一个严重的控制缺陷，但机构 CEO 威胁要投诉你，你怎么处理？"
      - "解释「物质外包」的概念及其在 MAS 框架下的申报要求。"
    what_they_want: "MAS 招的不是技术大牛，是能代表监管机构行使权力的「审查员」。他们要看你有没有监管心态：独立、客观、不被机构影响、能坚持立场。技术知识是必要条件，但专业判断和职业操守才是差异点。"
    bad_answer_example: "对「被 CEO 威胁投诉」的情景题说「我会再考虑一下，可能我的判断有问题」——这个答案对监管机构来说是灾难性的。MAS 审查员必须能够独立行使判断，不受被审查机构的压力影响。"
    good_answer_angle: "展示你理解监管权威的来源和正当程序：记录所有发现 → 按正式流程上报 → 给机构正式回应机会 → 不因外部压力改变审查结论。强调程序正义比快速和谐更重要。"
    salary_range: "SGD 80,000–110,000/年；含政府公积金、医疗、稳定晋升路径；工作稳定性远高于私营企业"
    required_certs: ["CISA", "CISSP", "ISO 27001 Lead Auditor"]
    hook: "进新加坡金管局需要过什么关"
    shocking_fact: "MAS 面试会要求你签署保密协议才能参加第二轮——因为第二轮的案例研究用的是真实（脱敏）监管案例。很多应聘者以为政府机构面试「死板好过」，结果发现 MAS 的技术深度丝毫不亚于私营银行。"
    category: singapore_interview

  # ── HONG KONG (5 entries) ─────────────────────────────────────────────────

  - slug: hsbc-hk-cyber-interview
    company: HSBC HK
    role: Cybersecurity Analyst
    market: Hong Kong
    rounds: 3
    real_questions:
      - "HSBC 在香港使用混合云架构，如果 AWS 上的工作负载被攻击者横向移动到本地数据中心，你的检测和响应方案是什么？"
      - "香港金融机构受到 HKMA 的网络安全评估框架（C-RAF）约束，你对这个框架的主要要求有什么了解？"
      - "描述一次你处理数据泄露事件的经历，你是如何决定是否需要上报监管机构的？"
      - "你如何评估一个钓鱼邮件告警的真实风险？从告警到关闭你的完整流程是什么？"
      - "HSBC 的香港团队需要和伦敦总部密切协作，你如何在时区差异中确保安全事件的高效响应？"
    what_they_want: "HSBC 香港的安全团队规模庞大，他们在找能独立工作又能跨团队协作的分析师。面试官评估的核心是你的「决策框架」——面对模糊信息时你如何做出有依据的判断，而不是找一个只会按手册操作的执行者。"
    bad_answer_example: "对数据泄露上报题说「我会立刻上报 HKMA」——这说明你不了解香港的监管上报门槛（需要评估事件严重性、影响范围，符合条件才触发上报义务）。草率上报会浪费监管资源，损害公司声誉。"
    good_answer_angle: "展示你的上报决策框架：影响评估（受影响客户数量/数据类型）→ 法律义务审查（个人资料条例 PDPO / HKMA 通报要求）→ 内部上报（CISO → 法律团队 → 合规团队）→ 形成上报建议。过程比答案更重要。"
    salary_range: "HKD 420,000–540,000/年（约 SGD 72k–93k）；含年终奖；总补偿视绩效可高 30%"
    required_certs: ["CISSP", "CISM", "CySA+"]
    hook: "汇丰香港网安面试全流程"
    shocking_fact: "HSBC 香港的第一轮面试是由 HR 主导的英语和普通话双语面试——面试官会突然切换语言测试你的反应，因为这个岗位需要同时服务香港本地团队和大陆监管机构。"
    category: hongkong_interview

  - slug: standard-chartered-hk-interview
    company: Standard Chartered HK
    role: Security Engineer
    market: Hong Kong
    rounds: 3
    real_questions:
      - "渣打在香港使用了多个 SIEM 平台，你如何设计一个跨平台的告警关联规则来检测 APT 组织的横向移动？"
      - "解释零信任架构的核心原则，以及在大型遗留银行系统中实施零信任的最大挑战是什么？"
      - "香港的《网络安全法》（2025）对金融机构有什么影响？你认为关键基础设施运营商最需要关注哪些条款？"
      - "你如何说服一个「我们从来没被攻击过，所以不需要额外安全投入」的 CIO？"
      - "描述你设置过的最有效的安全监控规则，它发现了什么真实威胁？"
    what_they_want: "渣打香港的面试官在测试你的「安全工程师成熟度」——能不能把技术方案和业务价值连接起来，能不能在遗留系统约束下提出实用方案，而不是总说「重构整个系统」。"
    bad_answer_example: "对零信任实施题说「首先需要替换所有遗留系统」——这个答案暴露了你没有在真实企业环境工作过的经验。渣打这类百年老行有大量无法替换的核心系统，「先替换遗留系统」在这里不可行，面试官想听的是渐进式零信任落地路径。"
    good_answer_angle: "展示渐进式实施思维：先识别高价值资产 → 在这些资产周围建立微隔离 → 引入身份验证强化（MFA/PAM）→ 逐步扩展到更多系统。强调不需要「一次性完成」零信任。"
    salary_range: "HKD 480,000–660,000/年（约 SGD 83k–114k）；含年终奖和福利"
