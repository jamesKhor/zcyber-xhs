    what_they_want: "阿里的 P6 面试（约 5-8 年经验级别）考的是系统性思维和工程深度——不是「你会用什么工具」，而是「你能不能设计可以支撑数亿用户的安全系统」。面试官是同级别的技术大牛，他们在评估你的技术视野够不够宽，同时足够深。"
    bad_answer_example: "对大规模 WAF 设计题给出一个「用 ModSecurity + 自定义规则」的回答——这是 SMB 级别的方案，暴露了你没有大规模系统设计经验。阿里面试官期望你讨论规则引擎的分布式架构、规则更新的热加载机制、误报率控制、性能压测方法。"
    good_answer_angle: "展示规模化思维：先问「当前系统 QPS 是多少、P99 延迟要求是什么」→ 再设计分层防护（边缘 + 业务层）→ 讨论规则引擎的决策树优化 → 提出 A/B 测试新规则的灰度方案。越能量化越好。"
    salary_range: "¥350,000–500,000/年（P6 级别）；含 15-100% 年终奖（视年份和业绩）；RSU（限制性股票）"
    required_certs: ["CISSP（加分项）", "云安全认证（阿里云/AWS）"]
    hook: "阿里P6安全工程师5轮面试真题"
    shocking_fact: "阿里安全工程师面试的第 4 轮是「逆向面试」——面试官会问你「你对我们的安全架构有什么问题要问？」，这轮实际上在测试你的学习欲望和技术敏感度。什么问题都没有的候选人基本确定失败，因为阿里认为好奇心是顶级工程师的核心特质。"
    category: china_interview

  - slug: tencent-cn-security-interview
    company: "腾讯 (Tencent)"
    role: Security Engineer
    market: China
    rounds: 5
    real_questions:
      - "微信每天有数十亿条消息传输，你如何在端到端加密和内容合规检测之间做技术设计的平衡？"
      - "腾讯游戏（王者荣耀/英雄联盟）面临大规模外挂攻击，描述你的反外挂技术方案。"
      - "你在 SDL（安全开发生命周期）实施中遇到的最大阻力是什么？你怎么克服的？"
      - "解释 Android 系统的 TrustZone 机制，以及攻击者如何可能绕过它。"
      - "你如何快速评估一个你从未见过的 APK 是否含有恶意代码？"
    what_they_want: "腾讯的安全面试比阿里更注重产品安全（Product Security）视角——因为腾讯的核心资产是数十亿用户的社交数据和游戏账号。面试官在评估你能不能理解腾讯业务的特殊安全挑战（社交数据隐私、游戏反作弊、移动端安全），而不是套用通用安全框架。"
    bad_answer_example: "对微信加密和合规的题目说「这是一个不可能同时解决的矛盾，只能牺牲其中一个」——腾讯面试官想看的是工程师的创造性解决方案（如服务端 NLP 检测 + 本地加密 + 合规报告机制的分层设计），给不出方案说明你的工程思维不足。"
    good_answer_angle: "展示你理解这道题背后的技术和监管双重约束，然后提出一个分层方案。承认存在真实矛盾，但展示如何用技术手段最大化两个目标——这种思维在腾讯这样的公司才能被认可。"
    salary_range: "¥300,000–450,000/年；含年终奖（通常 2-4 个月工资）；RSU 4 年归属"
    required_certs: ["CISSP（高级岗加分）", "移动安全相关认证"]
    hook: "腾讯安全工程师面试题全曝光"
    shocking_fact: "腾讯的第 5 轮面试（终面）是由安全团队负责人（T4 级别）亲自主持，持续约 2 小时——前 1 小时是技术深挖，后 1 小时是「你为什么选择腾讯而不是阿里或字节？」腾讯特别在意候选人是否真的理解腾讯的产品价值观，给不出差异化答案的候选人常在这里翻车。"
    category: china_interview

  - slug: cn-state-bank-security-interview
    company: "国有大行（四大行 / 国开行）"
    role: Information Security Officer
    market: China
    rounds: 3
    real_questions:
      - "根据人民银行发布的《金融行业网络安全等级保护实施指引》，三级系统的基本要求有哪些关键控制点？"
      - "国有银行的信息系统上线前需要通过等级保护测评，你作为信息安全负责人如何准备这个测评？"
      - "描述你参与过的最大规模的安全演练（如护网行动），你的角色和贡献是什么？"
      - "银行内部发现员工违规使用个人设备处理敏感客户数据，你的处置流程是什么？"
      - "人民银行《网络安全法》和银保监会的安全要求有什么关系？"
    what_they_want: "国有银行的信息安全岗不是纯技术岗——他们在招「懂合规、能管人、会写报告」的「安全管理者」。面试官更在意你的体制内工作经历、对监管框架的熟悉度、以及你能不能用官方语言写材料（等保报告、整改报告、应急预案）。"
    bad_answer_example: "大量讨论技术手段（防火墙配置、漏洞扫描工具）而忽略合规程序——国有银行的安全工作 60% 是合规文件和流程管理，40% 才是技术。面试官会觉得你「技术思维太重，不适合我们的工作模式」。"
    good_answer_angle: "展示你熟悉等级保护 2.0 框架、人民银行和银保监会的关键监管要求，能把技术控制措施映射到具体法规条款。强调你有参与或主导合规测评的实际经历。"
    salary_range: "¥150,000–250,000/年；含五险一金（高比例）；工作稳定；总补偿比互联网低但风险极小"
    required_certs: ["CISP（强制性加分）", "等级保护测评师", "CISSP（加分）"]
    hook: "四大国有银行信息安全岗怎么进"
    shocking_fact: "国有银行的信息安全岗面试通常有一道「政治题」：询问你对网络安全国家战略的理解，或者要求你解释《数据安全法》的核心原则——没有准备这类题目的候选人（特别是海归和民企背景的人）在这里会显得格格不入。"
    category: china_interview

  - slug: huawei-security-interview
    company: "华为 (Huawei)"
    role: Security Engineer
    market: China
    rounds: 4
    real_questions:
      - "华为的 5G 设备销往全球，你如何在产品设计阶段嵌入安全（Security by Design）而不影响上市时间？"
      - "你如何对一个嵌入式系统（如路由器固件）做安全审计？给出完整的工具和方法论。"
      - "华为面临来自多个国家的安全审查，你如何设计一个透明、可验证的安全保证机制？"
      - "描述一次你发现供应链安全风险并处理的经历。"
      - "解释 TPM（可信平台模块）在设备安全中的作用，以及攻击者可能如何绕过它。"
    what_they_want: "华为的安全工程师需要同时理解产品硬件、固件和软件安全——这和纯软件公司完全不同。面试官特别看重你对嵌入式系统安全和供应链安全的理解，以及你能不能在「全球监管审查」的背景下设计安全方案。"
    bad_answer_example: "对固件安全审计题只说「用 Binwalk 提取固件然后扫描已知漏洞」——这是入门级回答。华为面试官期望你讨论二进制逆向分析（Ghidra/IDA Pro）、自定义协议分析、硬件调试接口（JTAG/UART）以及如何绕过固件保护机制。"
    good_answer_angle: "展示嵌入式安全的层次：固件提取（Binwalk + 硬件接口）→ 文件系统分析 → 二进制逆向 → 动态分析（QEMU 模拟）→ 协议分析 → 报告。能讨论针对特定处理器架构（ARM/MIPS）的分析差异更好。"
    salary_range: "¥280,000–400,000/年；含年终奖（视部门和绩效差异很大）；华为独特的 TUP（虚拟股票分红）制度"
    required_certs: ["CISSP（加分）", "华为认证（HCIA/HCIP Security）"]
    hook: "华为安全工程师TUP股票分红真相"
    shocking_fact: "华为的安全工程师面试第 3 轮是英文技术面试——即使你的工作语言是中文，华为会要求你用英文描述一个复杂的安全架构，因为很多项目涉及国际客户和监管机构对接。英文技术表达能力差的候选人在这里频繁翻车。"
    category: china_interview

  # ── MALAYSIA (2 entries) ──────────────────────────────────────────────────

  - slug: maybank-my-security-interview
    company: Maybank
    role: Security Analyst
    market: Malaysia
    rounds: 3
    real_questions:
      - "马来西亚 Bank Negara Malaysia (BNM) 的《网络风险管理框架》对金融机构的事件上报要求是什么？"
      - "Maybank 同时在马来西亚、新加坡、印度尼西亚运营，如何统一管理跨境数据访问的安全策略？"
      - "你如何评估一个针对网银系统的钓鱼攻击活动的影响范围？给出你的调查步骤。"
      - "描述你用 SIEM 发现了一个真实安全事件的经历，你的分析过程是什么？"
      - "Maybank 在推进数字化转型，你如何确保新上线的 API 服务的安全性？"
    what_they_want: "Maybank 作为东南亚最大的银行之一，面试官在找能够在「监管合规」和「技术落地」之间架桥的分析师。他们特别看重你对 BNM 监管框架的理解，以及你有没有在马来西亚金融行业的实际工作经验。"
    bad_answer_example: "对跨境数据访问题直接说「统一使用一套策略就行」——马来西亚、新加坡、印度尼西亚有完全不同的数据本地化法规（个人数据保护法 PDPA / 印尼 GR 71号法规），「一套策略」说明你没做过跨境合规工作。"
    good_answer_angle: "展示你理解数据分类（哪些是每个国家要求本地存储的）→ 访问控制按国家数据主权设计 → 审计日志满足各国监管要求。说明你知道多个司法管辖区的数据合规不是技术问题而是法律映射问题。"
    salary_range: "MYR 60,000–90,000/年；含 EPF（公积金）、SOCSO；银行行业薪资稳定但涨薪幅度有限"
    required_certs: ["CompTIA Security+", "CySA+", "CISM（高级岗）"]
    hook: "马来西亚最大银行安全岗薪资真相"
    shocking_fact: "Maybank 的面试会问你对马来西亚《2023 年数字服务法》（新闻管理相关）的看法——不是考法律知识，而是在测试你能不能在敏感政策话题上保持专业中立态度，因为银行安全官员需要与政府监管机构打交道。"
    category: malaysia_interview

  - slug: big4-my-cyber-interview
    company: "Big 4 KL (KPMG / EY Malaysia)"
    role: Cyber Consultant
    market: Malaysia
    rounds: 3
    real_questions:
      - "马来西亚《个人资料保护法》（PDPA 2010）的「7 原则」是什么？哪个原则在审计中最常被违反？"
      - "你如何向一个从没做过网络安全审计的中小企业老板解释为什么他们需要进行渗透测试？"
      - "描述一次你在客户现场发现的最意外的安全漏洞，当时你如何处理？"
      - "马来西亚和新加坡的网络安全监管环境有什么主要差异？对跨境运营的公司有什么影响？"
      - "你如何在 3 个月内建立一个客户公司的基础安全运营能力（SOC 从零到有）？"
    what_they_want: "马来西亚四大网安顾问岗的独特之处是——客户规模差异极大，从 Petronas 这样的巨型国企到家族企业，都是客户。面试官在评估你能不能根据不同规模和成熟度的客户，灵活调整你的方案深度和沟通风格。"
    bad_answer_example: "对「向 SME 老板解释渗透测试」题用行话回答（「我会解释 CVE、攻击面、漏洞利用链」）——马来西亚很多中小企业主没有技术背景，用行话解释安全是顾问最常见的失误。面试官想看的是你能不能用「如果你的保险柜没有锁，小偷根本不需要暴力破解」这类比喻沟通。"
    good_answer_angle: "展示你的「客户等级意识」：先评估客户的技术成熟度 → 选择对应的沟通框架 → 用商业风险语言（「如果发生数据泄露，马来西亚 PDPA 罚款上限是 RM 500k，加上声誉损失」）替代技术语言。"
    salary_range: "MYR 65,000–96,000/年；Senior Consultant MYR 110k+；Manager MYR 140k+；含绩效奖金"
    required_certs: ["CISA", "CISSP", "ISO 27001 Lead Auditor"]
    hook: "吉隆坡四大网安顾问薪资全揭露"
    shocking_fact: "KPMG 马来西亚网安顾问面试有一轮是完全用马来文（Bahasa Malaysia）进行的——因为很多政府客户的官方沟通需要用马来文，不能流利使用马来文的候选人（包括本地华人）在这轮会遇到明显障碍。"
    category: malaysia_interview
