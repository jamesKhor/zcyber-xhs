  - slug: cisp-china-exam-reality
    cert: "CISP (注册信息安全专业人员) by CCIA (中国网络安全审查认证和市场监管大数据中心)"
    market: China
    attempt: first_pass
    study_months: 3
    study_hours_total: 200
    cost_total: "¥12,800（官方授权培训机构培训费 ¥8,800 + 考试注册费 ¥4,000；含实体教材）"
    exam_day_reality: >
      考试分两门：《信息安全保障》和《信息安全技术》，每门100道单选题，
      在国家指定考点（通常是各省考试院）集中笔试。
      培训是强制参加的，共5天，上午理论、下午习题，第五天模拟考试。
      培训结束后2个月内参加正式考试，我考试当天坐在考场里，
      发现左边是政府安全部门的人，右边是国企IT主管——CISP不是一个"年轻人考的证"，
      平均年龄感觉在35岁以上。
    what_no_one_tells_you: >
      CISP有资格门槛：必须有本科以上学历 + 2年信息安全相关工作经验（或大专+4年经验）。
      考试本身并不是最难的关卡，最难的是找到"靠谱的授权培训机构"——
      市面上CISP培训价格从¥6,800到¥18,000不等，差距来自"是否保过"和讲师质量，
      建议在CCIA官网核查机构授权资质，不要被"内部题库"的营销话术骗钱。
    career_impact: >
      CISP在国内甲方（政府、国企、金融）的等保合规项目里是明文要求——
      很多招标文件会写"项目团队须有X名CISP持证人员"。
      拿证后在北京IT安全岗薪资从¥15万/年涨到¥18万/年，
      更重要的是参与了一个等保2.0改造项目，额外补贴¥50,000。
      CISP的价值在体制内和大国企，在外企和创业公司认知度很低。
    pass_rate_official: "not disclosed（CCIA不公开；业界估计约65-75%，因为培训+闭卷组合）"
    hook: "CISP考试全程：¥12800买了什么"
    shocking_fact: "CISP考试当天平均考生年龄约35岁——这不是应届生的战场"
    category: governance_certs

