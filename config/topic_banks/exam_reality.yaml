# Topic bank for exam_reality archetype
# Raw, honest first-person accounts of cert study and exam day reality
# Tone: authentic, like a friend debriefing you after their exam — not a study guide
# Target: 18-35 Chinese speakers considering cybersecurity certs for career entry/growth

topics:

  # ─── ENTRY-LEVEL CERTS ───────────────────────────────────────────────────

  - slug: comptia-security-plus-reality
    cert: "CompTIA Security+ (SY0-701)"
    market: Global
    attempt: first_pass
    study_months: 2
    study_hours_total: 120
    cost_total: "USD 392（考试费 USD 392；Professor Messer 免费视频 + Darril Gibson 备考书 USD 30）"
    exam_day_reality: >
      考试当天早上8点到了 Pearson VUE 考场，要交手机、清空口袋、面对摄像头转一圈才能进考场。
      90道题，90分钟，感觉时间刚好够用——但有15%的题是"Performance-Based"拖拽题，
      第一道就把我拖了8分钟，差点把后面全部时间吃完。最终得了792分，及格线750，
      走出考场时腿软，不是因为难，是因为那种"不确定有没有通过"的感觉太折磨人了。
    what_no_one_tells_you: >
      Performance-Based Questions（PBQ）排在题目最前面，很多人因为在这里卡住导致后面的选择题时间不够。
      正确做法是先跳过PBQ、把所有选择题做完再回来处理——这一点备考书从来不告诉你。
    career_impact: >
      考过后投了23份简历，其中7家明确在JD里写了"Security+优先"，全部进了面试。
      最终拿到一家MNC IT Support岗位，薪资从马来西亚RM 3,200涨到RM 4,800，入门踏板作用明显。
    pass_rate_official: "not disclosed（业界估计约75%）"
    hook: "考Security+那天我腿软了"
    shocking_fact: "PBQ拖拽题占15%分值，第一道题就能吃掉你8分钟"
    category: entry_certs

  - slug: ejpt-first-cert-reality
    cert: "eJPT (eLearnSecurity Junior Penetration Tester) by INE"
    market: Global
    attempt: first_pass
    study_months: 1
    study_hours_total: 60
    cost_total: "USD 200（含INE Starter Pass订阅 + 考试Voucher，不需要额外买材料）"
    exam_day_reality: >
      考试全程在浏览器里进行，给你一个VPN接入一个模拟企业网络，72小时内完成20道题。
      我第一天花了4小时跑完Nmap扫描、找到了3台存在漏洞的主机，当晚睡觉前提交了15道题。
      第二天花2小时收尾，最终得了18/20，全程没有"考场"的压迫感，
      更像是在家里做一个CTF练习。但也正因如此，你要靠自律不去Google答案。
    what_no_one_tells_you: >
      eJPT不是多选题考试，是真实的黑盒渗透环境。很多人买了Voucher才发现自己连Linux基本命令都不熟——
      建议先在TryHackMe完成"Pre-Security"路径（约40小时）再来考，成功率会高很多。
    career_impact: >
      eJPT单独投简历基本没有HR认识这个证书，但它是进入OSCP备考的心理门槛测试。
      我用它证明了自己有动手能力，在面试里展示了报告和截图，面试官评价"比CEH更有说服力"。
      从Helpdesk跳到初级渗透测试实习，月薪涨幅SGD 800。
    pass_rate_official: "not disclosed（社区估计>85%）"
    hook: "200美元最值的安全入门证"
    shocking_fact: "考试给你72小时，不是90分钟——这是真实渗透不是背题"
    category: entry_certs

  - slug: ceh-vs-expectations
    cert: "CEH (Certified Ethical Hacker) v13 by EC-Council"
    market: Global
    attempt: failed_first
    study_months: 3
    study_hours_total: 180
    cost_total: "USD 1,699（官方考试费 + 强制在线培训材料；重考一次额外 USD 499）"
    exam_day_reality: >
      125道题，4小时，全部是单选题——听起来容易，但EC-Council的题目措辞极其刁钻，
      同一个知识点可以有三个"都对"的答案，你要选"最对"的那个。
      第一次考了62%，及格线70%，差了8分。走出考场我直接在停车场坐了20分钟，
      脑子里反复回放那些我犹豫了又改掉答案的题——事后核对，改错了11道。
    what_no_one_tells_you: >
      CEH在渗透测试从业者圈子里口碑很差（常被嘲笑是"背题证书"），
      但HR部门和非技术招聘官非常认识这个名字。这个割裂导致一个现象：
      你考了CEH，技术面试官会轻视你，但简历筛选阶段你会通过——
      所以它在"进门"环节有用，在"被尊重"环节没用。
    career_impact: >
      第二次考了74%通过。拿证后薪资没有立刻涨，但大马某银行IT安全部门的HR确实因为看到CEH才给了我电话面试机会。
      最终拿到offer，薪资RM 6,500，比之前的RM 5,200涨了25%——但面试技术题我答得很差，
      靠的是之前做过的项目经验，不是CEH本身。
    pass_rate_official: "not disclosed（EC-Council不公开，社区估计约60-65%）"
    hook: "CEH考了两次，钱花了1.7万"
    shocking_fact: "CEH官方费用超过USD 1,699，重考一次再加USD 499——这是EC-Council的商业模式"
    category: entry_certs

  - slug: google-cybersecurity-cert-reality
    cert: "Google Cybersecurity Certificate (via Coursera)"
    market: Global
    attempt: first_pass
    study_months: 3
    study_hours_total: 90
    cost_total: "USD 210（Coursera订阅3个月 × USD 70/月；无单独考试费）"
    exam_day_reality: >
      没有"考场"——每个模块结束后做Coursera平台的测验，及格即通过，支持无限重试。
      整个课程8个模块，我每天晚上花1小时，3个月内全部完成。
      最后提交了一个"事件响应剧本"作为毕业项目，Coursera系统自动评分通过。
      全程最难的不是内容，是坚持——第6周我差点放弃，因为内容开始重复。
    what_no_one_tells_you: >
      Google证书不是一个"考试证书"——没有Prometric考场，没有传统的Pass/Fail体验。
      它更接近一个结构化自学路径，业界认可度远低于Security+。
      很多招聘JD写的是"CompTIA Security+优先"，而不是"Google Cybersecurity Certificate优先"——
      单独拿这个证书投技术岗位效果有限，适合完全零基础的职业转换者建立概念框架。
    career_impact: >
      完成后投了15份初级SOC分析师职位，3家回复，1家面试，0个offer。
      HR反馈是"希望有更多实操经验"。后来补考了Security+，同样的简历重新投，回复率明显上升。
      Google证书对我最大的价值是让我理解了NIST框架和SIEM的基本概念——作为学习工具有价值，作为求职敲门砖不够。
    pass_rate_official: "not applicable（无统一考试，无官方通过率）"
    hook: "谷歌网安证书：值还是不值？"
    shocking_fact: "该证书无传统考场，无及格线，Coursera平台测验可无限重试——HR其实知道这一点"
    category: entry_certs

  # ─── CORE TECHNICAL CERTS ────────────────────────────────────────────────

  - slug: oscp-first-attempt-fail
    cert: "OSCP (OffSec Certified Professional) by OffSec"
    market: Global
    attempt: failed_first
    study_months: 4
    study_hours_total: 350
    cost_total: "USD 1,649（90天实验室 + 一次考试，含重考机会一次）"
    exam_day_reality: >
      考试是23小时45分钟的实战黑客马拉松，凌晨12点整准时开始。
      第一台机器我用了3小时才拿到user shell，兴奋得站起来在房间转圈。
      但到第18小时，我只拿到了55分（及格线70分），整个人在椅子上盯着屏幕发呆，
      脑子已经不转了。凌晨6点我做了一个错误决定——去躺了4小时，
      醒来发现时间只剩3小时，再也来不及了，最终以60分失败。
    what_no_one_tells_you: >
      OSCP最杀人的不是技术难度，是体力和睡眠管理。
      大多数失败的人不是因为不会黑，是因为在第15-20小时判断力崩塌，
      做了错误决定（去睡觉、放弃某台机器、陷入rabbit hole太久）。
      备考时要做模拟长时间作战训练，不只是练技术。
    career_impact: >
      第一次失败后我在LinkedIn发了一篇"我OSCP考砸了"的帖子，
      意外收到了两家安全公司的私信，说欣赏我的透明度和已展示的能力。
      其中一家给了我一个带薪实习，月薪SGD 2,800，
      说"在读OSCP的人比很多有证的人更有吸引力"。
    pass_rate_official: "not disclosed（OffSec从不公开；社区长期估计约15-20%）"
    hook: "OSCP考了23小时，我在第18小时崩了"
    shocking_fact: "OSCP考试23小时45分钟不间断——这不是夸张，是官方规则"
    category: technical_certs

  - slug: oscp-passed-third-attempt
    cert: "OSCP (OffSec Certified Professional) by OffSec"
    market: Global
    attempt: failed_multiple
    study_months: 18
    study_hours_total: 900
    cost_total: "USD 3,200+（初始90天实验室 USD 1,649 + 两次额外重考费 + 额外实验室延期）"
    exam_day_reality: >
      第三次考试，我在开始前睡够了8小时，备好了咖啡、备好了零食清单，甚至写了一张
      "考试节奏表"贴在显示器旁边——每台机器最多分配多少时间、什么时候必须放弃换下一台。
      考试第4小时拿到第一台，第9小时拿到第二台，第14小时第三台，最终得了80分通过。
      那一刻我在键盘前哭了，不是因为喜悦，是因为18个月的压力在那一秒全部释放了。
    what_no_one_tells_you: >
      OSCP第三次通过的人普遍有一个共同点：他们在第二次失败后彻底改变了备考方法。
      不是练更多机器，而是系统地补了"枚举方法论"——把每一步侦察、每一类漏洞检查
      都写成自己的checklist，考场上不靠灵感，靠流程。方法论才是OSCP的核心。
    career_impact: >
      拿证三周后收到猎头主动联系，推荐一个渗透测试顾问职位，年薪从之前的SGD 60,000
      涨到SGD 95,000，涨幅58%。OSCP在JD里出现的频率之高让我震惊——
      我搜了一下，新加坡渗透测试岗位里有OSCP要求的占到约65%。
    pass_rate_official: "not disclosed（社区估计约15-20%）"
    hook: "OSCP考了三次，花了两万多"
    shocking_fact: "OSCP社区估计通过率仅15-20%——三次通关的人，花费往往超过USD 3,000"
    category: technical_certs

  - slug: oscp-passed-first-try
    cert: "OSCP (OffSec Certified Professional) by OffSec"
    market: Global
    attempt: first_pass
    study_months: 6
    study_hours_total: 500
    cost_total: "USD 1,649（90天实验室 + 考试，一次通过无额外费用）"
    exam_day_reality: >
      考试凌晨12点开始，我做了一个反常识决定：前两小时我不打任何机器，
      只做reconnaissance，把所有信息收集完整记录好，再规划进攻顺序。
      第3小时开始打第一台，到第11小时已经拿到70分，
      我让自己睡了5小时，完全放松地在第17小时用剩余时间拿到了第四台机器，最终90分收官。
    what_no_one_tells_you: >
      一次通过OSCP的人几乎都在HackTheBox的"Pro Labs"或"TJnull的NetHunter列表"
      里练满了至少50台机器，并且每台机器都写了详细的writeup——
      不是为了以后看，而是因为写writeup逼着你真正理解攻击链，而不是靠运气打穿。
      "多做机器"不够，"写够writeup"才是一次通过的真正秘密。
    career_impact: >
      拿证后没有主动找工作，在LinkedIn更新了OSCP并写了一篇备考总结，
      7天内收到4家公司私信，其中两家是顶级咨询公司。
      最终接受了一个渗透测试分析师职位，薪资SGD 78,000/年，比之前的开发工作涨了40%。
    pass_rate_official: "not disclosed（社区估计约15-20%）"
    hook: "OSCP一次通过，我做对了什么"
    shocking_fact: "一次通过OSCP的人平均练了50+台HackTheBox机器——每台都写了详细报告"
    category: technical_certs

  - slug: crto-48hr-exam-reality
    cert: "CRTO (Certified Red Team Operator) by Zero-Point Security"
    market: "UK / Singapore / Australia"
    attempt: first_pass
    study_months: 2
    study_hours_total: 100
    cost_total: "GBP 399（课程 + 考试，不含重考；约SGD 680）"
    exam_day_reality: >
      考试是48小时，给你一个完整的Active Directory环境，
      目标是用Cobalt Strike完成从初始访问到域控权限的完整攻击链。
      我第一天12小时拿到了4/6的flag，第二天睡醒后2小时拿到第5个，
      最后一个flag卡了我6小时——原来是一个Kerberoasting的变体，
      我一直在找错方向。最终47小时58分钟提交，差点超时，心跳到我现在都记得。
    what_no_one_tells_you: >
      CRTO的课程内容由Daniel Duggan（RastaMouse）写，质量比OSCP官方材料高很多——
      他直接教你Cobalt Strike的实战用法，而大多数课程只教理论。
      但考试环境偶尔有技术故障（VM重置、网络断线），
      考前一定要加入CRTO Discord频道，出问题时那里的支持响应比邮件快很多。
    career_impact: >
      CRTO在新加坡和英国红队岗位的认可度正在快速上升，
      但比OSCP便宜得多（GBP 399 vs USD 1,649）。
      拿证后我的简历从"会渗透测试"变成了"懂Cobalt Strike的红队操作员"，
      有两家咨询公司主动联系，最终薪资涨幅约SGD 15,000/年。
    pass_rate_official: "not disclosed（Zero-Point Security不公开）"
    hook: "48小时红队考试，差2分钟超时"
    shocking_fact: "CRTO只要GBP 399，OSCP要USD 1,649——两者在红队岗位认可度的差距正在缩小"
    category: technical_certs

  - slug: pnpt-reality
    cert: "PNPT (Practical Network Penetration Tester) by TCM Security"
    market: Global
    attempt: first_pass
    study_months: 2
    study_hours_total: 80
    cost_total: "USD 399（含TCM全套课程 + 考试 + 一次免费重考）"
    exam_day_reality: >
      考试给你5天黑一个模拟公司的网络，再给2天写渗透测试报告。
      第一天我用了6小时完成全面侦察，第二天拿到初始立足点，
      第三天横向移动拿到域控，比预期快很多。
      最花时间的反而是报告写作——TCM要求你写的报告格式跟真实咨询公司交付物一样，
      我来来回回改了8小时才满意。这是唯一一个考完觉得自己学到了"工作技能"而不是"考试技能"的证书。
    what_no_one_tells_you: >
      PNPT是全程开卷考试——你可以用Google，可以用自己的工具，可以参考任何笔记。
      这意味着它考的不是"你背没背"，而是"你能不能在真实场景下把知识用出来"。
      很多人以为开卷会很容易，实际上反而更暴露你是否真的懂——因为没有选项可以蒙。
    career_impact: >
      我把完整的渗透测试报告（匿名处理后）放进了Github Portfolio，
      3个月内那个repo收到了200+ Star，其中一个Star来自一家安全公司的CTO，
      后来他主动私信我，最终给了我一个远程渗透测试顾问的合同。
      PNPT产出了一份真实的工作样本，这比任何证书徽章都有说服力。
    pass_rate_official: "not disclosed（TCM Security不公开；社区认为>70%）"
    hook: "400美元最良心的实战渗透证书"
    shocking_fact: "PNPT全程开卷——考的不是记忆力，是你能不能真的打穿一个网络"
    category: technical_certs

  # ─── GOVERNANCE/MANAGEMENT CERTS ─────────────────────────────────────────

  - slug: cissp-6month-study-reality
    cert: "CISSP (Certified Information Systems Security Professional) by ISC2"
    market: Global
    attempt: passed_eventually
    study_months: 7
    study_hours_total: 450
    cost_total: "USD 1,199（考试费 USD 749 + Destillat官方备考书 USD 80 + Boson模拟题 USD 90 + 一次重考 USD 280）"
    exam_day_reality: >
      CISSP现在是CAT（Computerized Adaptive Testing）格式，
      题目数量在125-175道之间动态调整，考到你答对答错的模式被算法判断"足够置信"为止。
      我答到第147题，屏幕突然黑掉，我以为系统崩溃了——其实是考试结束了。
      等了2分钟，屏幕显示"PASS"，但我站在那里半分钟没动，不敢相信。
      前6个月每天早上5:30起床读书，那一刻全部值了。
    what_no_one_tells_you: >
      CISSP考的是"管理者视角"，不是技术答题——
      每道题你要问自己"如果我是CISO，我会优先选哪个？"而不是"哪个技术上正确？"。
      很多技术背景的考生第一次失败是因为选了"技术正确但管理优先级错误"的答案。
      这个思维转换没人告诉你，备考书也很少强调，但它是通过率的核心变量。
    career_impact: >
      拿证后8个月，薪资从SGD 85,000涨到SGD 120,000，
      职位从"Senior Security Analyst"晋升为"Security Manager"。
      CISSP是我职业生涯里回报最高的投资，但也是最痛苦的7个月——
      我婚礼前3天还在背OSI模型，我太太至今拿这个事开玩笑。
    pass_rate_official: "not disclosed（ISC2不公开；行业估计约70%，但含大量有经验者）"
    hook: "备考CISSP的7个月，我婚礼前还在学"
    shocking_fact: "CISSP要求5年工作经验——这是考前门槛，不是考后要求"
    category: governance_certs

  - slug: cissp-failed-once
    cert: "CISSP (Certified Information Systems Security Professional) by ISC2"
    market: Global
    attempt: failed_first
    study_months: 4
    study_hours_total: 280
    cost_total: "USD 1,029（初次考试 USD 749 + 备考书 USD 80 + 模拟题 USD 200）"
    exam_day_reality: >
      CAT考试到第125题结束，屏幕黑掉，显示"FAIL"——这是考试能给你最短的时间。
      我备考了4个月，结果考到最少题数就被淘汰出局，那种感觉是"被算法宣判"。
      回看记录，我在"Security and Risk Management"领域的正确率只有58%，
      而这个领域占整个考试15%的权重——它是CISSP权重最大的单一领域，
      我却把复习时间都花在了我最熟悉的"Communications and Network Security"上。
    what_no_one_tells_you: >
      CAT格式的残酷在于：如果算法早早判断你"不够好"，你很快就会遇到题目越来越简单的现象——
      这实际上是一个坏兆头，说明系统已经在你的失败区确认了置信度。
      但你在考场里完全感觉不出来，因为题目看起来"变容易了"，
      很多人反而会放松心态，直到屏幕黑掉才知道结果。
    career_impact: >
