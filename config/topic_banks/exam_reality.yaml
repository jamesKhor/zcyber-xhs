      每节课附带的实验比OSCP的实验室质量更高。
      很多人只看到"GXPN = 昂贵证书"，忽略了参加SANS课程本身就是
      进入精英渗透测试社群的门票——课间和其他学员的交流价值可能超过课程内容本身。
    career_impact: >
      拿证后薪资从SGD 120,000涨到SGD 160,000（年薪），
