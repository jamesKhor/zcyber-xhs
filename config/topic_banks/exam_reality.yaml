      但CISM的标准答案通常是"先报告给管理层，进行风险评估，再决定修复优先级"。
      整场考试我在脑子里不断提醒自己"你现在是经理，不是工程师"，
      最终通过，但出考场后感觉脑子被重新格式化了一遍。
