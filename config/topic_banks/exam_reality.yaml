      新加坡早期阶段的安全创业公司（Pre-Series B以下）招聘标准和大企业完全不同——
      他们没有HR筛选层，是工程师直接看简历，
      而工程师更在乎"你能做什么"而不是"你考了什么"。
      一个有12篇详细writeup的GitHub Profile比一张CEH证书在这些公司里有效10倍。
      这个策略在银行和政府机构完全行不通，但在创业生态里是真实的捷径。
    career_impact: >
      零证书入职，薪资SGD 4,200/月（初级安全工程师），低于有OSCP的同级别岗位（SGD 5,500-6,500）——
      这个薪资差是真实存在的，必须承认。
      但入职8个月后公司赞助我考OSCP，薪资涨到SGD 5,800，追上了差距。
      策略是：用portfolio进门，用在职期间拿证弥补薪资差。
    pass_rate_official: "not applicable"
    hook: "没有任何证书，我是怎么进安全公司的"
    shocking_fact: "用GitHub Portfolio进入新加坡安全创业公司，省下了买证书的USD 1,600——但薪资比有OSCP的同级别低SGD 1,300/月"
    category: entry_certs

  - slug: cert-stack-diminishing-returns
    cert: "多证书叠加 (CISSP + CISM + OSCP + CEH + Security+)"
    market: Global
    attempt: first_pass
    study_months: 48
    study_hours_total: 1500
    cost_total: "USD 5,800+（5张证书累计考试费及材料费，不含时间成本）"
    exam_day_reality: >
      没有单一的"考试那天"——这是4年里考了5张证书的回顾。
      第一张（Security+）让薪资涨了15%。第二张（OSCP）涨了40%。
      第三张（CISSP）涨了22%。第四张（CISM）：面试官看了一眼，说"你已经有CISSP了，
      CISM加分不明显"，薪资谈判没有额外加成。
      第五张（CEH）：我在一次面试里甚至没提，因为有OSCP的情况下提CEH反而感觉在稀释履历。
    what_no_one_tells_you: >
      证书的边际报酬是递减的，而且有"证书过多"的反效果——
      在技术圈，看到一个人有CEH + CISSP + CISM + Security+，
      有经验的面试官会问"你有没有做过真实的红队项目？"
      因为证书多暗示你把时间花在考试上，而不是实战。
      最优策略是：1-2张针对目标岗位的核心证书 + 可展示的实战项目——不是5张证书。
    career_impact: >
      4年5张证书后，我的年薪是SGD 115,000。
      同期一个只有OSCP但有3年实际红队项目经历的朋友，年薪SGD 130,000。
      证书不能替代经验，在第4、5张证书上花的时间，用来做开源项目或参与实际渗透项目，
      回报可能高3倍。我不后悔考这些证书，但我后悔考试的顺序和时机。
    pass_rate_official: "not applicable"
    hook: "考了5张证书才发现：第4张开始没用了"
    shocking_fact: "有3年实战红队经验但只有OSCP的人，薪资可以比有5张证书的人高SGD 15,000/年"
    category: governance_certs
