      CISM不是技术考试，是管理哲学考试。
      最大的陷阱是：有技术背景的人往往会把"风险最小"的选项当成对的，
      但CISM的逻辑是"风险可接受"——接受残余风险、优先业务连续性、报告而非自行决定。
      这个管理思维转变需要有意识地练习，不是读书能自动产生的。
