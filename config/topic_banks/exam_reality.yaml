      CISM帮我从"技术专家通道"跳到了"管理通道"。
      拿证后面试Security Manager职位，面试官说"CISM表明你理解安全不只是工具和漏洞"。
      最终薪资从USD 85,000（高级分析师）涨到USD 110,000（安全经理），涨幅29%。
