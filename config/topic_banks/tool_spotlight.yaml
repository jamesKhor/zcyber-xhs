# Topic bank for tool_spotlight archetype
# Each entry: one tool with 5 use cases for carousel slides

topics:
  - slug: nmap-5-uses
    tool: nmap
    problem: 网络扫描瑞士军刀
    command: nmap
    category: network
    uses:
      - title: 局域网设备发现
        command: "nmap -sn 192.168.1.0/24"
        caption: 找出网络里所有在线设备
      - title: 全端口扫描
        command: "nmap -p- 192.168.1.100"
        caption: 看看目标开了哪些端口
      - title: 操作系统识别
        command: "nmap -O 192.168.1.100"
        caption: 猜出对方跑的什么系统
      - title: 服务版本探测
        command: "nmap -sV -p 80,443 target.com"
        caption: 识别端口上跑的具体服务
      - title: 漏洞脚本扫描
        command: "nmap --script vuln 192.168.1.100"
        caption: 用内置脚本检测已知漏洞

  - slug: curl-5-uses
    tool: curl
    problem: 命令行里的万能HTTP客户端
    command: curl
    category: web
    uses:
      - title: 查看HTTP响应头
        command: "curl -I https://example.com"
        caption: 快速检查服务器信息和状态码
      - title: 下载文件
        command: "curl -O https://example.com/file.zip"
        caption: 一行命令下载任何文件
      - title: 发送POST请求
        command: "curl -X POST -H 'Content-Type: application/json' -d '{\"key\":\"val\"}' url"
        caption: 模拟API调用发送JSON数据
      - title: 跟踪重定向
        command: "curl -L -v https://short.link/abc"
        caption: 追踪短链接的完整跳转路径
      - title: 测量响应速度
        command: "curl -w '%{time_total}s' -o /dev/null -s url"
        caption: 精确测量网站响应时间

  - slug: wireshark-5-uses
    tool: Wireshark/tshark
    problem: 网络流量分析神器
    command: tshark
    category: network
    uses:
      - title: 抓取HTTP请求
        command: "tshark -i eth0 -f 'port 80'"
        caption: 实时查看所有HTTP流量
      - title: 提取DNS查询
        command: "tshark -i eth0 -f 'port 53' -T fields -e dns.qry.name"
        caption: 看看你的设备在偷偷访问哪些域名
      - title: 分析PCAP文件
        command: "tshark -r capture.pcap -q -z conv,tcp"
        caption: 离线分析抓包文件的TCP连接
      - title: 过滤特定IP
        command: "tshark -i eth0 -f 'host 1.2.3.4'"
        caption: 只看某个IP的所有通信
      - title: 导出HTTP对象
        command: "tshark -r file.pcap --export-objects http,output/"
        caption: 从抓包中提取传输的文件

  - slug: python-5-uses
    tool: Python
    problem: 安全工程师的自动化利器
    command: python3
    category: scripting
    uses:
      - title: 端口扫描器
        command: "python3 -c \"import socket; [print(p) for p in range(1,1025) if socket.socket().connect_ex(('target',p))==0]\""
        caption: 10行代码写个端口扫描器
      - title: 密码哈希生成
        command: "python3 -c \"import hashlib; print(hashlib.sha256(b'password').hexdigest())\""
        caption: 快速生成各种哈希值
      - title: Base64编解码
        command: "python3 -c \"import base64; print(base64.b64decode('SGVsbG8=').decode())\""
        caption: 一行搞定编解码
      - title: HTTP服务器
        command: "python3 -m http.server 8080"
        caption: 秒开一个文件共享服务器
      - title: 简易爬虫
        command: "python3 -c \"import urllib.request; print(urllib.request.urlopen('https://httpbin.org/ip').read().decode())\""
        caption: 不装任何库也能发HTTP请求

  - slug: grep-5-uses
    tool: grep/ripgrep
    problem: 文本搜索之王
    command: grep
    category: forensics
    uses:
      - title: 搜索日志中的错误
        command: "grep -i 'error\\|fail\\|fatal' /var/log/syslog"
        caption: 快速定位系统日志中的异常
      - title: 递归搜索代码
        command: "grep -rn 'password' --include='*.py' ."
        caption: 在整个项目里找硬编码密码
      - title: 排除干扰行
        command: "grep -v '^#' config.conf | grep -v '^$'"
        caption: 只看配置文件的有效行
      - title: 提取IP地址
        command: "grep -oE '([0-9]{1,3}\\.){3}[0-9]{1,3}' access.log"
        caption: 从日志中提取所有IP
      - title: 统计匹配次数
        command: "grep -c 'GET /api' access.log"
        caption: 统计某个API被调用了多少次

  - slug: jq-5-uses
    tool: jq
    problem: JSON数据处理神器
    command: jq
    category: data
    uses:
      - title: 格式化JSON
        command: "echo '{\"a\":1}' | jq ."
        caption: 让乱成一团的JSON变好看
      - title: 提取字段
        command: "cat data.json | jq '.users[].name'"
        caption: 从嵌套JSON中提取你要的数据
      - title: 过滤数组
        command: "cat data.json | jq '.items[] | select(.price > 100)'"
        caption: 按条件筛选JSON数组元素
      - title: 转换格式
        command: "cat data.json | jq -r '.[] | [.name, .email] | @csv'"
        caption: JSON秒变CSV格式
      - title: 合并文件
        command: "jq -s '.[0] * .[1]' a.json b.json"
        caption: 把两个JSON文件合并成一个

  - slug: docker-5-uses
    tool: Docker
    problem: 安全实验室必备容器工具
    command: docker
    category: devops
    uses:
      - title: 运行Kali工具
        command: "docker run -it kalilinux/kali-rolling /bin/bash"
        caption: 不装系统也能用Kali的全套工具
      - title: 隔离运行可疑文件
        command: "docker run --rm -it --network none ubuntu bash"
        caption: 断网沙箱里安全分析可疑文件
      - title: 启动漏洞靶场
        command: "docker run -d -p 80:80 vulnerables/web-dvwa"
        caption: 一行命令搭建练习靶场
      - title: 查看容器日志
        command: "docker logs --tail 50 -f container_name"
        caption: 实时跟踪容器输出排查问题
      - title: 扫描镜像漏洞
        command: "docker scout cves my-image:latest"
        caption: 检查镜像里有没有已知漏洞

  - slug: ffmpeg-5-uses
    tool: ffmpeg
    problem: 音视频处理瑞士军刀（跨界神器）
    command: ffmpeg
    category: utility
    uses:
      - title: 提取视频音频
        command: "ffmpeg -i video.mp4 -vn audio.mp3"
        caption: 从视频里扒出背景音乐
      - title: 压缩视频
        command: "ffmpeg -i input.mp4 -crf 28 output.mp4"
        caption: 视频体积砍一半画质还行
      - title: 截取片段
        command: "ffmpeg -i input.mp4 -ss 00:01:00 -t 30 clip.mp4"
        caption: 从第1分钟开始截30秒
      - title: 转换格式
        command: "ffmpeg -i input.avi output.mp4"
        caption: 任意格式互转就这么简单
      - title: 生成GIF
        command: "ffmpeg -i input.mp4 -vf 'fps=10,scale=480:-1' output.gif"
        caption: 视频变表情包一行搞定

  - slug: git-5-uses
    tool: git
    problem: 代码版本控制（安全人也得会）
    command: git
    category: devops
    uses:
      - title: 搜索提交历史
        command: "git log --all -S 'password' --oneline"
        caption: 找出谁把密码提交到了代码里
      - title: 查看文件修改历史
        command: "git log --follow -p -- config.py"
        caption: 追踪一个文件的所有改动
      - title: 恢复误删文件
        command: "git checkout HEAD~1 -- deleted_file.py"
        caption: 从上个版本找回被删的文件
      - title: 查看谁改的
        command: "git blame security.py"
        caption: 精确到每一行是谁什么时候改的
      - title: 暂存当前工作
        command: "git stash && git stash pop"
        caption: 临时切换任务不丢代码

  - slug: openssl-5-uses
    tool: openssl
    problem: 加密解密证书一把梭
    command: openssl
    category: crypto
    uses:
      - title: 查看证书信息
        command: "openssl x509 -in cert.pem -text -noout"
        caption: 解读SSL证书里的所有信息
      - title: 检查远程证书
        command: "openssl s_client -connect example.com:443 2>/dev/null | openssl x509 -noout -dates"
        caption: 查看网站证书是否过期
      - title: 生成密钥对
        command: "openssl genrsa -out key.pem 4096"
        caption: 生成一个4096位的RSA密钥
      - title: 加密文件
        command: "openssl enc -aes-256-cbc -salt -in secret.txt -out secret.enc"
        caption: AES-256加密你的敏感文件
      - title: 计算文件哈希
        command: "openssl dgst -sha256 file.bin"
        caption: 验证文件完整性防篡改

  - slug: nc-netcat-5-uses
    tool: netcat (nc)
    problem: 网络调试的瑞士军刀
    command: nc
    category: network
    uses:
      - title: 端口连通测试
        command: "nc -zv target.com 80 443"
        caption: 快速检查端口是否开放
      - title: 简易聊天
        command: "nc -l 1234  # 接收端  |  nc target 1234  # 发送端"
        caption: 两台机器之间最简单的通信
      - title: 传输文件
        command: "nc -l 1234 > file.txt  # 接收  |  nc target 1234 < file.txt  # 发送"
        caption: 不装任何软件传文件
      - title: 端口扫描
        command: "nc -zv target.com 20-100"
        caption: 轻量级端口范围扫描
      - title: 获取服务Banner
        command: "echo '' | nc -w3 target.com 22"
        caption: 看看对方SSH跑的什么版本

  - slug: httpie-5-uses
    tool: HTTPie
    problem: 比curl更好用的HTTP客户端
    command: http
    category: web
    uses:
      - title: 简洁GET请求
        command: "http https://httpbin.org/get"
        caption: 自带语法高亮的HTTP响应
      - title: 发送JSON数据
        command: "http POST api.example.com name=test age:=25"
        caption: 自动识别JSON不用手写header
      - title: 表单提交
        command: "http -f POST example.com/login user=admin pass=123"
        caption: 模拟表单登录
      - title: 下载文件
        command: "http --download https://example.com/report.pdf"
        caption: 带进度条的文件下载
      - title: 自定义Header
        command: "http GET api.com Authorization:'Bearer token123'"
        caption: 轻松添加认证头

  - slug: ss-5-uses
    tool: ss
    problem: 网络连接状态监控
    command: ss
    category: sysadmin
    uses:
      - title: 查看监听端口
        command: "ss -tulnp"
        caption: 看看哪些程序在监听端口
      - title: 查看所有TCP连接
        command: "ss -ta"
        caption: 列出所有TCP连接状态
      - title: 按进程过滤
        command: "ss -tp | grep nginx"
        caption: 只看nginx的网络连接
      - title: 统计连接数
        command: "ss -s"
        caption: 快速查看连接状态统计
      - title: 查找特定端口连接
        command: "ss -tn dport = :443"
        caption: 找出所有连到443端口的IP

  - slug: find-5-uses
    tool: find
    problem: 文件搜索终极工具
    command: find
    category: sysadmin
    uses:
      - title: 找最近修改的文件
        command: "find / -mtime -1 -type f 2>/dev/null"
        caption: 过去24小时被改过的文件
      - title: 找SUID文件
        command: "find / -perm -4000 -type f 2>/dev/null"
        caption: 排查可能被利用的提权文件
      - title: 找大文件
        command: "find / -size +100M -type f 2>/dev/null"
        caption: 找出占空间的大文件
      - title: 按扩展名搜索
        command: "find . -name '*.log' -delete"
        caption: 批量删除所有日志文件
      - title: 找空目录
        command: "find . -type d -empty"
        caption: 清理项目里的空文件夹

  - slug: tmux-5-uses
    tool: tmux
    problem: 终端多窗口管理器
    command: tmux
    category: productivity
    uses:
      - title: 创建新会话
        command: "tmux new -s work"
        caption: 命名会话方便管理
      - title: 分屏工作
        command: "Ctrl+B %  # 左右分  |  Ctrl+B \" # 上下分"
        caption: 一个终端看多个窗口
      - title: 后台运行
        command: "tmux detach  # 断开  |  tmux attach -t work  # 重连"
        caption: 关掉SSH程序照样跑
      - title: 复制模式
        command: "Ctrl+B [  # 进入  |  q 退出"
        caption: 翻看终端历史输出
      - title: 同步输入
        command: "setw synchronize-panes on"
        caption: 同时在多个窗格输入命令

  - slug: bat-5-uses
    tool: bat
    problem: cat命令的豪华升级版
    command: bat
    category: productivity
    uses:
      - title: 语法高亮查看文件
        command: "bat config.yaml"
        caption: 自动识别语言并高亮显示
      - title: 显示行号和改动
        command: "bat --diff main.py"
        caption: 像IDE一样显示git改动
      - title: 搜索并高亮
        command: "bat --highlight-line 10:20 script.sh"
        caption: 高亮显示特定行范围
      - title: 管道使用
        command: "curl -s api.com | bat -l json"
        caption: 给管道输出加上语法高亮
      - title: 浏览多文件
        command: "bat src/*.py"
        caption: 一次看多个文件带文件名标注

  - slug: hashcat-5-uses
    tool: hashcat
    problem: GPU加速密码恢复工具
    command: hashcat
    category: password
    uses:
      - title: 字典攻击
        command: "hashcat -m 0 hash.txt wordlist.txt"
        caption: 用字典破解MD5哈希
      - title: 掩码攻击
        command: "hashcat -m 0 -a 3 hash.txt '?l?l?l?d?d'"
        caption: 知道密码格式时精准爆破
      - title: 规则攻击
        command: "hashcat -m 0 hash.txt wordlist.txt -r rules/best64.rule"
        caption: 字典+变形规则大幅提高命中率
      - title: 识别哈希类型
        command: "hashcat --identify hash.txt"
        caption: 不确定哈希类型让它帮你判断
      - title: 显示已破解
        command: "hashcat -m 0 hash.txt --show"
        caption: 查看之前已经破解的结果

  - slug: rsync-5-uses
    tool: rsync
    problem: 高效文件同步传输
    command: rsync
    category: sysadmin
    uses:
      - title: 本地备份
        command: "rsync -av --progress /data/ /backup/data/"
        caption: 增量备份只传改动的文件
      - title: 远程同步
        command: "rsync -avz -e ssh /local/ user@remote:/remote/"
        caption: 通过SSH加密传输文件
      - title: 排除文件
        command: "rsync -av --exclude='*.log' --exclude='.git' src/ dst/"
        caption: 同步时跳过不需要的文件
      - title: 干运行预览
        command: "rsync -avn /src/ /dst/"
        caption: 先看看会传哪些文件再执行
      - title: 镜像删除
        command: "rsync -av --delete /src/ /dst/"
        caption: 让目标和源完全一致包括删除

  - slug: awk-5-uses
    tool: awk
    problem: 文本处理的编程语言
    command: awk
    category: data
    uses:
      - title: 提取列数据
        command: "awk '{print $1, $4}' access.log"
        caption: 从日志里只取IP和状态码
      - title: 条件过滤
        command: "awk '$9 >= 500' access.log"
        caption: 只看5xx错误的请求
      - title: 统计求和
        command: "awk '{sum+=$5} END {print sum}' data.txt"
        caption: 对第5列数字求总和
      - title: 去重统计
        command: "awk '{a[$1]++} END {for(k in a) print a[k],k}' log | sort -rn"
        caption: 统计每个IP出现了几次
      - title: 字段替换
        command: "awk -F: '{$2=\"***\"} 1' OFS=: /etc/passwd"
        caption: 批量替换指定列的内容

  - slug: dig-5-uses
    tool: dig
    problem: DNS查询专业工具
    command: dig
    category: network
    uses:
      - title: 查询A记录
        command: "dig +short example.com"
        caption: 快速查域名对应的IP
      - title: 查询MX记录
        command: "dig MX example.com +short"
        caption: 找到邮件服务器地址
      - title: 反向解析
        command: "dig -x 8.8.8.8 +short"
        caption: 通过IP查域名
      - title: 追踪解析过程
        command: "dig +trace example.com"
        caption: 看DNS从根服务器到结果的全过程
      - title: 指定DNS服务器
        command: "dig @1.1.1.1 example.com"
        caption: 用Cloudflare DNS查询对比结果
