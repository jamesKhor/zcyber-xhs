  - slug: cn-dengji-baohu-entry-path
    background: 想找稳定安全工作的人（不喜欢高强度竞争）
    target_market: China
    timeline_months: 6
    entry_role: 等级保护测评师 / 等保顾问
    first_cert: 等级保护测评师（各省信息安全测评机构）
    cert_cost_local: "¥3000-5000（省级差异大）"
    learning_path:
      - GB/T 22239-2019 等级保护基本要求（免费标准文件）
      - 等保测评实操培训（省级测评机构）
      - 考取等保测评师证
      - 投递各省等保测评机构或乙方等保咨询岗
    salary_at_entry: "¥100,000–150,000（乙方）/ ¥120,000–180,000（甲方/政府）"
    top_tip: "等保测评是中国特有的安全合规需求，每年有大量政府/国企强制要求；竞争比大厂技术岗小很多，适合想要稳定的人"
    hook: "等级保护测评师：被低估的稳定安全工作路线"
    category: china_specific

  - slug: pentest-first-bug-bounty-timeline
    background: 想做渗透测试/漏洞挖掘的技术爱好者
    target_market: Global
    timeline_months: 12
    entry_role: Bug Bounty Hunter / Junior Penetration Tester
    first_cert: eJPT（入门）→ PNPT / OSCP
    cert_cost_local: "eJPT：约 ¥1450 / PNPT：约 ¥2900 / OSCP：约 ¥10800"
    learning_path:
      - TryHackMe Jr Penetration Tester 路径（2个月）
      - HackTheBox Starting Point（1个月）
      - eJPT 认证考试（3个月后）
      - HackerOne / Bugcrowd 新手项目（开始赚第一笔奖励）
    salary_at_entry: "Bug Bounty 初期：USD 500-2000/月 / 渗透测试初级岗：SG SGD 70k+"
    top_tip: "第一个 Bug Bounty 漏洞通常在 6-12 个月学习后才能找到；不要放弃，大多数成功的猎人在前 3 个月都没有收获"
    hook: "从零到第一个 Bug Bounty：真实需要多长时间？"
    category: pentest_path

  - slug: blue-team-vs-red-team-entry
    background: 刚开始考虑进入网安行业的新人
    target_market: Global
    timeline_months: 6
    entry_role: "蓝队：SOC Analyst / 红队：Junior Pentester"
    first_cert: "蓝队：Security+ + CySA+ / 红队：Security+ + eJPT"
    cert_cost_local: "蓝队路线合计：约 ¥4600 / 红队路线合计：约 ¥3250"
    learning_path:
      - 蓝队：TryHackMe SOC L1 + Security+ + Splunk/SIEM 实操
      - 红队：TryHackMe Jr Penetration Tester + eJPT
    salary_at_entry: "蓝队初级（SG）：SGD 55-75k / 红队初级（SG）：SGD 70-90k"
    top_tip: "蓝队岗位数量是红队的 3-5 倍，更容易拿第一份工作；红队薪资天花板更高；技术能力强且喜欢解谜选红队，稳定就业优先选蓝队"
    hook: "红队 vs 蓝队：哪个方向更容易拿到第一份安全工作？"
    category: learning_path

  - slug: secops-soc-easiest-entry-china
    background: 想进入网安行业的国内应届生/转行者
    target_market: China
    timeline_months: 4
    entry_role: 安全运营 / SOC / 应急响应
    first_cert: CISAW（入门）或 Security+
    cert_cost_local: "CISAW：¥3000 / Security+：约 ¥2800"
    learning_path:
      - B站/YouTube 安全运营基础课（免费，1个月）
      - CISAW 备考（2个月）
      - SIEM 工具实操（Splunk 免费版/ElasticSearch SIEM）
      - 投递乙方安全运营岗（比渗透测试竞争少）
    salary_at_entry: "¥100,000–130,000（一线城市乙方）"
    top_tip: "安全运营是中国安全行业岗位最多的方向，比渗透测试好入行；SOC 岗位在大量银行/运营商有大量招聘，CISAW 是敲门砖"
    hook: "中国网安最容易入行的岗位：安全运营工程师实战路线"
    category: china_specific

