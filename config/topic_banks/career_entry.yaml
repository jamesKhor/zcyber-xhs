    top_tip: "纪律部队背景在新加坡政府安全岗有隐性优势——保密资格审查更容易通过；DSTA 有专门面向 NS 人员的职位"
    hook: "服役完想进网安行业？新加坡纪律部队背景的隐藏优势"
    category: military_background

  - slug: military-police-to-cybersec-au
    background: 澳洲军队/警察/情报部门背景
    target_market: Australia
    timeline_months: 6
    entry_role: Security Analyst (Government) / Threat Intelligence
    first_cert: CompTIA Security+ / OSCP for technical roles
    cert_cost_local: "Security+：AUD 590 / OSCP：AUD 2250"
    learning_path:
      - ASD Cyber Security Pathways（政府专项计划）
