    top_tip: "等保测评是中国特有的安全合规需求，每年有大量政府/国企强制要求；竞争比大厂技术岗小很多，适合想要稳定的人"
    hook: "等级保护测评师：被低估的稳定安全工作路线"
    category: china_specific

