    salary_at_entry: "AUD 85,000–110,000（含 NV1 clearance premium）"
    top_tip: "持有 NV1/NV2 许可的应聘者比普通候选人薪资高 AUD 20-40k；军队背景的清查通过率极高"
    hook: "澳洲军人退役想进网安？NV1许可是你的隐藏加薪筹码"
