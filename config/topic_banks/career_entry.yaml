  - slug: non-tech-to-grc-china
    background: 非技术背景（法律/审计/财务/管理类）
    target_market: China
    timeline_months: 9
    entry_role: GRC分析师 / 合规专员 / 等保咨询
    first_cert: CISP 或 ISO27001 主任审核员
    cert_cost_local: "CISP：¥5000 / ISO27001 LA：¥6000"
    learning_path:
      - 学习等级保护2.0标准（免费文档+B站课程，2个月）
      - ISO27001 主任审核员培训（5天，¥4000-6000）
      - 考取 CISP（需授权培训，¥5000）
      - 投递安全咨询公司（奇安信、绿盟等乙方 GRC 岗）
    salary_at_entry: "¥100,000–150,000（一线城市乙方起步）"
    top_tip: "法律/审计背景反而是竞争优势——很多GRC岗需要写合规报告，技术背景的人反而写不好；先投乙方积累项目经验"
    hook: "法学/审计背景，完全不懂技术，能进网安行业吗？"
    category: non_tech

  - slug: non-tech-to-grc-sg
    background: 非技术背景（法律/会计/管理）
    target_market: Singapore
    timeline_months: 9
    entry_role: GRC Analyst / Compliance Analyst
    first_cert: ISO27001 Lead Implementer / CISM（工作后考）
    cert_cost_local: "ISO27001 LI：SGD 2800（培训+考试）"
    learning_path:
      - MAS TRM Guidelines 通读（免费，是SG金融安全法规基础）
      - ISO27001 Lead Implementer 培训（5天，SGD 2800）
      - ISACA Cybersecurity Fundamentals（在线，SGD 150）
      - 投递银行/Big 4/GovTech 的 GRC/Risk 岗
    salary_at_entry: "SGD 55,000–70,000"
    top_tip: "新加坡金融行业 GRC 需求因 MAS TRM 新规激增；MAS TRM 熟悉度是面试最大加分项，一般 IT 背景的竞争者不了解"
    hook: "新加坡GRC岗：不会写代码的人，安全行业还要你吗？"
    category: non_tech

  - slug: developer-to-appsec
    background: 软件开发工程师（2年以上经验）
    target_market: Global (SG/AU/CN)
    timeline_months: 4
    entry_role: Application Security Engineer / AppSec Analyst
    first_cert: GWEB 或 eWPT（Web渗透测试）
    cert_cost_local: "eWPT：约 USD 200 / GWEB：约 USD 979"
    learning_path:
      - PortSwigger Web Security Academy（完全免费，最好的AppSec入门）
      - OWASP Top 10 实践（配合 DVWA 本地靶机）
      - Bug Bounty 入门（HackerOne / Bugcrowd）
      - 将 AppSec 审计技能加入 GitHub + 投递
    salary_at_entry: "SG: SGD 80,000–100,000 / AU: AUD 100,000–120,000"
    top_tip: "开发背景进 AppSec 是所有路线里最快的——你已经懂代码逻辑，只需学攻击视角；PortSwigger Academy 完全免费且业界认可"
    hook: "程序员转安全工程师：4个月的路线图，不需要重新读学位"
    category: career_pivot

