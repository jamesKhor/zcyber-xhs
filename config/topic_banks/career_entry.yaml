  - slug: cs-grad-to-security-au
    background: CS学生/应届毕业生（有编程基础）
    target_market: Australia (Sydney/Melbourne)
    timeline_months: 6
    entry_role: Junior Security Analyst / SOC L1
    first_cert: CompTIA Security+
    cert_cost_local: "AUD 590（考试费）"
    learning_path:
