  - slug: mid-career-pivot-30-plus
    background: 30岁以上非技术行业（金融/销售/HR等）转型
    target_market: Singapore / Malaysia
    timeline_months: 12
    entry_role: GRC Analyst / Security Awareness / Vendor Risk
    first_cert: CompTIA Security+ + ISO27001 Foundation
    cert_cost_local: "Security+：SGD 550 / ISO27001 Foundation：SGD 800"
    learning_path:
      - Cybersecurity 基础自学（Coursera Google Certificate，SGD 50/月）
      - CompTIA Security+ 备考（6周）
      - 用原行业经验申请 GRC/Compliance 岗（金融背景最有优势）
      - 考取 ISO27001 Lead Implementer（工作后）
    salary_at_entry: "SG: SGD 55,000–70,000（GRC起步）"
    top_tip: "30岁转型最大误区是想从技术岗切入——GRC/合规路线才是最快的；你的行业经验是竞争优势，不是包袱"
    hook: "30岁转行进网安：从零开始，1年能做到吗？"
    category: mid_career

  - slug: fresh-grad-cn-jiafang-vs-yifang
    background: 应届生（网络安全/计算机相关专业）
    target_market: China
    timeline_months: 3
    entry_role: 安全运营/渗透测试/安全分析师
    first_cert: CISP 或 CISP-PTE（视方向）
    cert_cost_local: "CISP：¥5000 / CISP-PTE：¥8000"
    learning_path:
      - 校内 CTF 竞赛（最好的简历证明）
      - 实习：乙方安全公司优先（比甲方学到更多技术）
      - 考取 CISP（工作后，公司报销更常见）
      - 1-2年乙方经验后再考虑跳甲方
    salary_at_entry: "乙方：¥100k-140k / 甲方：¥120k-160k（一线城市）"
    top_tip: "应届生选乙方成长更快，2-3年后跳甲方薪资涨幅比内部晋升快；大厂校招是另一条路但竞争激烈"
    hook: "网安专业毕业生：第一份工作去甲方还是乙方？3年后差距有多大"
    category: fresh_grad

  - slug: bootcamp-vs-degree-vs-selfstudy
    background: 考虑入行网安的各类背景人士
    target_market: Global
    timeline_months: 12
    entry_role: Security Analyst / Junior Pentest
    first_cert: Security+（自学路线）
    cert_cost_local: "自学：USD 600 / 训练营：USD 8000-15000 / 学位：USD 30000+"
    learning_path:
      - 自学路线：TryHackMe + Security+ + HackTheBox（总费用 < USD 800）
      - 训练营：SANS/TCM Security（高质量但贵）
      - 学位：CS/CySec 本科（最全面但最慢最贵）
    salary_at_entry: "无实质差异——雇主看证书和技能演示，不太看是否训练营"
    top_tip: "自学+证书路线的 ROI 最高；训练营适合需要纪律约束的人；学位适合想要完整CS基础的人"
    hook: "网安训练营花¥10万，还是自学花¥3000？真实ROI对比"
    category: learning_path

