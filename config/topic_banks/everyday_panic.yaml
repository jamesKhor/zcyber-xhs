# Topic bank for everyday_panic archetype
# Relatable "oh no" moments → simple solution

topics:
  - slug: forgot-wifi-password
    problem: 出差忘记Wi-Fi密码了
    scenario: 连过的Wi-Fi密码想不起来
    solution: 系统里查已保存的密码
    tool: netsh/security
    command: 'netsh wlan show profile name="WiFi名称" key=clear'
    category: password

  - slug: suspicious-excel
    problem: 同事发来的Excel要不要打开
    scenario: 收到不明来源的Office文件
    solution: 先用在线沙箱扫一下
    tool: VirusTotal
    command: "上传到 virustotal.com 或 any.run 检查"
    category: safety

  - slug: phone-lost-wifi
    problem: 手机丢了想看最后连了哪个Wi-Fi
    scenario: 手机丢失想追踪位置线索
    solution: 查路由器管理页面的连接记录
    tool: router
    command: "登录 192.168.1.1 → 已连接设备 → 查看历史"
    category: incident

  - slug: suspect-monitoring
    problem: 怀疑电脑被装了监控软件
    scenario: 公司电脑或借给别人后担心被监控
    solution: 检查网络连接和启动项
    tool: netstat
    command: "netstat -ano | findstr ESTABLISHED"
    category: incident

  - slug: weird-browser-redirect
    problem: 浏览器总是自动跳转到奇怪网站
    scenario: 打开浏览器就被劫持到广告页
    solution: 检查浏览器扩展和DNS设置
    tool: browser
    command: "chrome://extensions → 删除可疑插件 → 重置DNS"
    category: malware

  - slug: leaked-password-check
    problem: 听说又有数据泄露，我的密码安全吗
    scenario: 新闻报道大规模数据泄露事件
    solution: 用HIBP查你的邮箱是否在泄露库中
    tool: haveibeenpwned
    command: "访问 haveibeenpwned.com 输入你的邮箱"
    category: safety

  - slug: unknown-app-permissions
    problem: 手机app要了一堆奇怪权限
    scenario: 一个计算器app要访问通讯录和摄像头
    solution: 检查并关闭不必要的权限
    tool: phone-settings
    command: "设置 → 隐私 → 权限管理 → 逐个检查"
    category: privacy

  - slug: public-wifi-safe
    problem: 咖啡店的免费Wi-Fi能用吗
    scenario: 在公共场所需要用Wi-Fi办公
    solution: 用VPN或避免登录敏感账号
    tool: vpn
    command: "开启VPN → 不登录银行/支付类网站 → 用完忘记网络"
    category: safety

  - slug: spam-calls-flood
    problem: 突然收到大量骚扰电话和短信
    scenario: 注册了某个网站后信息被卖
    solution: 开启手机骚扰拦截+投诉
    tool: phone
    command: "设置 → 电话 → 静音未知来电 + 12321举报"
    category: privacy

  - slug: accidental-delete-file
    problem: 重要文件被误删了
    scenario: 不小心清空了回收站
    solution: 用数据恢复工具扫描
    tool: testdisk/photorec
    command: "photorec /dev/sda"
    category: recovery

  - slug: usb-virus-fear
    problem: 捡到/借到一个U盘要不要插
    scenario: 别人的U盘可能带病毒
    solution: 在隔离环境中检查
    tool: sandbox
    command: "用虚拟机或断网电脑打开 → 先杀毒扫描"
    category: safety

  - slug: two-factor-locked
    problem: 换手机后两步验证登不上了
    scenario: 旧手机的验证器app数据丢失
    solution: 用备份码恢复或联系客服
    tool: 2fa
    command: "找当初保存的恢复码 → 输入备用验证方式"
    category: account

  - slug: qr-code-scam
    problem: 扫了个二维码怕中招
    scenario: 街边/邮件里的可疑二维码
    solution: 先预览链接再决定是否打开
    tool: qr-check
    command: "长按二维码 → 预览链接 → 不认识的域名别点"
    category: safety

  - slug: email-attachment-safe
    problem: 邮件附件是病毒还是正常文件
    scenario: 收到PDF/DOC附件不确定安全性
    solution: 用VirusTotal扫描附件
    tool: virustotal
    command: "下载但不打开 → 上传到 virustotal.com"
    category: safety

  - slug: forgot-linux-password
    problem: Linux密码忘了进不去系统
    scenario: 服务器或虚拟机密码遗忘
    solution: 通过单用户模式重置
    tool: grub
    command: "重启 → GRUB菜单按e → init=/bin/bash → passwd"
    category: password

  - slug: computer-slow-suddenly
    problem: 电脑突然变得巨慢
    scenario: 没装什么新东西但CPU飙到100%
    solution: 查看资源占用找出元凶
    tool: task-manager
    command: "任务管理器 → 按CPU排序 → 搜索可疑进程名"
    category: incident

  - slug: webcam-light-on
    problem: 摄像头灯亮了但我没开视频
    scenario: 笔记本摄像头指示灯异常亮起
    solution: 检查哪个程序在用摄像头
    tool: process-check
    command: "设置 → 隐私 → 摄像头 → 查看最近访问的应用"
    category: incident

  - slug: child-safe-internet
    problem: 小孩要上网怎么保护
    scenario: 担心孩子接触不良内容
    solution: 设置家长控制和DNS过滤
    tool: dns
    command: "路由器DNS设为 family.cloudflare-dns.com (1.1.1.3)"
    category: privacy

  - slug: website-not-https
    problem: 这个网站没有小锁标志安全吗
    scenario: 要输入信息但发现不是HTTPS
    solution: 不要在HTTP页面输入敏感信息
    tool: browser
    command: "看地址栏 → 没有🔒就不要输密码/银行卡"
    category: safety

  - slug: account-hacked-what-now
    problem: 社交账号被盗了怎么办
    scenario: 发现账号发了自己没发的内容
    solution: 立即改密码+开二次验证+通知好友
    tool: account-recovery
    command: "改密码 → 退出所有设备 → 开启2FA → 检查绑定邮箱"
    category: incident

  - slug: unexpected-2fa-code
    problem: 收到了自己没有请求的2FA验证码
    scenario: 突然收到六位数短信验证码，自己根本没在登录
    solution: 有人已经知道你的密码——立刻改密码
    tool: account-settings
    command: "立即改密码 → 开启Authenticator APP → 检查是否有陌生登录设备"
    category: account

  - slug: login-alert-overseas
    problem: 收到从北京/境外登录的告警通知
    scenario: 明明在深圳，邮件提示账号从北京被登录
    solution: 强制退出所有会话，立刻改密码
    tool: account-security
    command: "账号安全设置 → 查看登录设备列表 → 强制退出所有会话 → 改密码"
    category: account

  - slug: battery-draining-fast
    problem: 手机电池突然一小时掉30%
    scenario: 没刷视频没打游戏，手机电量飞速下降
    solution: 查后台运行的可疑进程
    tool: phone-settings
    command: "设置 → 电池 → 电池用量 → 找出异常耗电的App → 卸载或限制后台"
    category: malware

  - slug: fake-apple-id-email
    problem: 收到"你的Apple ID已停用"邮件，真的假的
    scenario: 邮件要求点链接重新激活Apple ID
    solution: 看发件人域名，真苹果只发 @apple.com
    tool: email-check
    command: "鼠标悬停查看实际发件邮箱 → 不点链接 → 直接去官网 apple.com 登录核实"
    category: phishing

  - slug: clicked-suspicious-link
    problem: 手快点了可疑链接，接下来怎么办
    scenario: 点开了朋友发的奇怪链接，页面一闪而过
    solution: 接下来5分钟的紧急处置步骤
    tool: browser
    command: "断网 → 清除浏览器缓存和Cookie → 手机重启 → 改密码 → 检查App权限"
    category: incident

  - slug: apk-outside-appstore
    problem: 在应用商店外下载了APK，有风险吗
    scenario: 某App在官方商店被下架，从第三方网站下载了安装包
    solution: 安装前先扫描，安装后检查权限
    tool: virustotal
    command: "上传APK到 virustotal.com → 安装后查权限 → 设置→应用→只允许必要权限"
    category: malware

  - slug: unknown-device-on-router
    problem: 路由器管理页面发现陌生设备
    scenario: 家里只有3台设备，路由器显示连了5台
    solution: 踢掉陌生设备，换路由器Wi-Fi密码
    tool: router-admin
    command: "登录 192.168.1.1 → 已连接设备 → 封锁MAC地址 → 改Wi-Fi密码"
    category: incident

  - slug: google-activity-strange-location
    problem: Google/苹果活动记录显示去过自己没去过的地方
    scenario: 隐私报告里出现陌生城市的定位记录
    solution: 检查账号登录设备，关闭可疑定位权限
    tool: account-activity
    command: "myaccount.google.com → 安全 → 查看登录设备 → 移除陌生设备"
    category: account

  - slug: new-admin-account-windows
    problem: Windows电脑多了个自己没创建的管理员账号
    scenario: 在用户管理里发现一个陌生的管理员帐户
    solution: 立即断网，用防病毒工具全盘扫描
    tool: windows-settings
    command: "设置→账号→其他用户→删除陌生账号 → 杀毒全扫 → 检查计划任务"
    category: malware

  - slug: browser-homepage-hijacked
    problem: 浏览器首页变成了没见过的搜索引擎
    scenario: 打开Chrome发现默认主页被改掉了
    solution: 删除可疑扩展，重置浏览器设置
    tool: browser
    command: "chrome://extensions → 删除可疑插件 → 设置→重置浏览器设置→恢复默认"
    category: malware

  - slug: fake-package-sms
    problem: 收到"你有包裹等待领取"短信附带奇怪链接
    scenario: 短信显示快递异常，点链接填信息就能解决
    solution: 不点链接，直接去快递官网查单号
    tool: sms-check
    command: "不要点短信链接 → 手动打开顺丰/京东官网或官方APP查询快递状态"
    category: phishing

  - slug: app-new-permissions
    problem: 一个用了很久的App突然要求新权限
    scenario: 更新后App要求访问通讯录，以前从来不需要
    solution: 拒绝授权，查查这个权限有什么用
    tool: phone-settings
    command: "设置→隐私→权限管理→找到该App→关闭可疑权限→如不影响使用就保持关闭"
    category: privacy

  - slug: outgoing-calls-not-mine
    problem: 电话账单出现了自己没打过的电话
    scenario: 月账单里有深夜打出去的陌生号码记录
    solution: SIM卡或手机可能被入侵，立刻联系运营商
    tool: carrier
    command: "联系运营商挂失检查 → 改手机账户密码 → 检查手机是否被Root"
    category: incident

  - slug: opened-pdf-invoice-stranger
    problem: 打开了陌生人发来的"PDF发票"
    scenario: 收到一封自称是供应商的邮件，附了个PDF
    solution: PDF可以执行宏和脚本，立刻检查系统
    tool: antivirus
    command: "断网 → 用Windows Defender全盘扫描 → 检查计划任务和启动项"
    category: incident

  - slug: email-sending-spam-itself
    problem: 邮箱在自己发垃圾邮件给联系人
    scenario: 朋友反映收到了我发的奇怪广告邮件
    solution: 账号已被盗，立刻改密码并检查转发规则
    tool: email-settings
    command: "改邮箱密码 → 检查并删除可疑转发规则 → 开启2FA → 通知联系人别点链接"
    category: account

  - slug: unknown-device-router-hex
    problem: 路由器显示一台叫"UNKNOWN"或随机字母的设备
    scenario: 设备名称是一串十六进制数字，不知道是什么
    solution: 可能是邻居蹭网或入侵设备
    tool: router-admin
    command: "记下MAC地址 → 封锁 → 换一个WPA3加密的强Wi-Fi密码 → 关闭WPS功能"
    category: incident

  - slug: computer-wakes-3am
    problem: 电脑每天凌晨3点自动从睡眠唤醒
    scenario: 早上发现电脑在运行但自己昨晚明明关了屏幕
    solution: 检查计划任务和远程唤醒设置
    tool: task-scheduler
    command: "任务计划程序 → 查看所有计划任务 → 删除可疑条目 → 设备管理器→关闭网卡唤醒"
    category: malware

  - slug: cloud-storage-full-mysteriously
    problem: 收到云存储已满告警，但我没上传任何东西
    scenario: iCloud/百度网盘突然提示已用满，自己没上传过东西
    solution: 可能有设备在同步数据，检查哪些设备连着账号
    tool: cloud-settings
    command: "账号→设备→查看所有已登录设备 → 移除陌生设备 → 改密码"
    category: account

  - slug: chrome-extension-unknown
    problem: 发现一个自己不记得安装的Chrome扩展
    scenario: 扩展栏出现一个图标，点开显示有读取所有网站数据的权限
    solution: 立刻禁用并删除，检查近期浏览历史
    tool: browser
    command: "chrome://extensions → 找到可疑扩展 → 删除 → 改所有重要账号密码"
    category: malware

  - slug: password-manager-breach-alert
    problem: Google密码管理器提示密码已出现在数据泄露中
    scenario: 浏览器弹出警告某个网站的密码已被泄露
    solution: 立刻为该网站改密码，并检查是否多个账号用同一密码
    tool: password-manager
    command: "点击警告 → 立刻改密码 → 检查是否有其他网站用了相同密码 → 逐一更改"
    category: account
