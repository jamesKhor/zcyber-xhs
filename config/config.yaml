# zcyber-xhs-pipeline configuration

llm:
  provider: deepseek  # deepseek | kimi | anthropic
  model: deepseek-chat
  temperature: 0.8
  max_tokens: 1800  # carousel JSON (5 slides + body + tags) needs ~1400-1600 tokens; 900 caused truncation

schedule:
  # Day of week (0=Mon, 6=Sun) → archetype
  rotation:
    0: problem_command
    1: real_story      # Tue: humanized breach narrative (replaces tool_spotlight)
    2: everyday_panic
    3: rank_war        # Thu: opinion poll / debate (replaces before_after)
    4: news_hook
    5: mythbust
    6: hacker_pov
  # Generation runs at this hour (24h)
  generate_hour: 8
  # Publish drains approved queue at this hour
  publish_hour: 12

publishing:
  max_per_day: 2
  min_hours_between: 4
  jitter_minutes: 20
  retry_attempts: 3
  xhs_mcp_url: ${XHS_MCP_URL:-http://localhost:18060}

content:
  # Chinese content (XHS / 小红书)
  cta: "更多威胁情报 → 主页 zcybernews"
  safety_disclaimer: "仅限自己设备/授权测试"
  education_disclaimer: "本内容仅供网络安全学习和研究用途"
  ai_label: ""
  default_tags:
    - "#网络安全"
    - "#信息安全"
    - "#zcybernews"

  # English content (Instagram — future use, content ready now)
  en_cta: "More threat intel → zcybernews.com"
  en_safety_disclaimer: "For authorized testing and educational purposes only"
  en_default_tags:
    - "#cybersecurity"
    - "#infosec"
    - "#hacking"
    - "#zcybernews"

images:
  width: 1080
  height: 1440
  output_dir: output/images
