# zcyber-xhs-pipeline configuration

llm:
  provider: deepseek  # deepseek | kimi | anthropic
  model: deepseek-chat
  temperature: 0.8
  max_tokens: 2400  # carousel JSON (5 slides + body + tags) can reach ~2000 tokens; keep headroom

schedule:
  # Day of week (0=Mon, 6=Sun) → archetype
  # Career/education rotation — aspirational, not scary
  # Audience: 18-35 Chinese speakers not in / entering / early in cybersec career
  rotation:
    0: cert_war        # Mon: head-to-head cert comparison + tier list
    1: salary_map      # Tue: salary reveal by market, role, yoe
    2: career_entry    # Wed: break-in roadmap for non-security people
    3: cert_war        # Thu: second cert matchup (different market/angle)
    4: career_entry    # Fri: second entry roadmap (different background)
    5: salary_map      # Sat: second market salary reveal
    6: cert_war        # Sun: cert tier list / ROI analysis

  # Generation runs at this hour (24h)
  generate_hour: 8
  # Publish drains approved queue at this hour
  publish_hour: 12

publishing:
  max_per_day: 2
  min_hours_between: 4
  jitter_minutes: 20
  retry_attempts: 3
  xhs_mcp_url: ${XHS_MCP_URL:-http://localhost:18060}

content:
  # Chinese content (XHS / 小红书)
  cta: "更多网安职业干货 → zcybernews.com/salary"
  career_cta: "更多网安职业干货 → zcybernews.com/salary"
  safety_disclaimer: "仅限自己设备/授权测试"
  education_disclaimer: "本内容仅供网络安全学习和研究用途"
  ai_label: ""
  default_tags:
    - "#网络安全"
    - "#信息安全"
    - "#zcybernews"

  # English content (Instagram — future use, content ready now)
  en_cta: "More threat intel → zcybernews.com"
  en_safety_disclaimer: "For authorized testing and educational purposes only"
  en_default_tags:
    - "#cybersecurity"
    - "#infosec"
    - "#hacking"
    - "#zcybernews"

images:
  width: 1080
  height: 1440
  output_dir: output/images
