<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --bg:     #0f0a00;
    --panel:  #1a1200;
    --border: #2d2000;
    --text:   #fff8e8;
    --dim:    #9a8a6a;
    --orange: #FF7043;
    --yellow: #FFD54F;
    --cyan:   #00C8FF;
    --green:  #00E676;
  }

  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: var(--bg);
    {% if background_image %}
    background-image: url('{{ background_image }}');
    background-size: cover;
    background-position: center;
    {% endif %}
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  /* Background overlay so text is readable over photos */
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(15,10,0,0.75) 0%, rgba(15,10,0,0.92) 100%);
    pointer-events: none;
  }

  /* ── TOP accent bar ── */
  .top-bar {
    height: 32px;
    background: linear-gradient(90deg, var(--orange), var(--yellow));
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 72px;
    gap: 52px;
    position: relative;
    z-index: 1;
  }

  /* Panic emoji — massive, instant visual cue */
  .emoji-row {
    font-size: 120px;
    line-height: 1;
  }

  /* Category chip */
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: rgba(255,112,67,0.15);
    border: 1.5px solid rgba(255,112,67,0.45);
    border-radius: 40px;
    padding: 12px 28px;
    width: fit-content;
  }
  .chip-label {
    font-size: 28px;
    color: var(--orange);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 700;
  }

  /* BIG headline */
  .headline {
    font-size: 130px;
    font-weight: 900;
    color: var(--orange);
    line-height: 1.05;
    word-break: break-word;
    text-shadow: 0 0 80px rgba(255,112,67,0.3);
  }

  /* Solution block */
  .solution-block {
    background: rgba(0,230,118,0.08);
    border: 1.5px solid rgba(0,230,118,0.3);
    border-left: 6px solid var(--green);
    border-radius: 16px;
    padding: 32px 36px;
  }
  .sol-label {
    font-size: 26px;
    color: var(--green);
    text-transform: uppercase;
    letter-spacing: 4px;
    font-weight: 700;
    margin-bottom: 14px;
  }
  .sol-text {
    font-size: 50px;
    color: var(--cyan);
    word-break: break-all;
    line-height: 1.35;
    font-family: "SF Mono", "Fira Code", monospace;
  }

  .caption {
    font-size: 46px;
    color: var(--dim);
    line-height: 1.4;
  }

  .footer {
    padding: 32px 72px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1.5px solid var(--border);
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }
  .brand {
    font-size: 38px;
    color: var(--cyan);
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
  }
  .cta {
    font-size: 30px;
    color: var(--cyan);
    background: rgba(0, 200, 255, 0.08);
    border: 1.5px solid rgba(0, 200, 255, 0.25);
    border-radius: 40px;
    padding: 10px 28px;
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
  }
</style>
</head>
<body>
  {% if background_image %}<div class="overlay"></div>{% endif %}

  <div class="top-bar"></div>

  <div class="main">
    {% if scenario_emoji %}
    <div class="emoji-row">{{ scenario_emoji }}</div>
    {% else %}
    <div class="chip"><span class="chip-label">EVERYDAY CYBER</span></div>
    {% endif %}

    <div class="headline">{{ headline }}</div>

    {% if command %}
    <div class="solution-block">
      <div class="sol-label">SOLUTION</div>
      <div class="sol-text">{{ command }}</div>
    </div>
    {% endif %}

    {% if caption %}
    <div class="caption">{{ caption }}</div>
    {% endif %}
  </div>

  <div class="footer">
    <span class="brand">ZCYBERNEWS</span>
    <span class="cta">{{ cta }}</span>
  </div>
</body>
</html>
