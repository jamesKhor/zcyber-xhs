<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --base: #000000;
    --surface0: #0d1117;
    --surface1: #161b22;
    --text: #f0f4f8;
    --subtext: #8b949e;
    --cyan: #00B8FF;
    --orange: #f0883e;
    --yellow: #d29922;
    --green: #3fb950;
  }

  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: var(--base);
    {% if background_image %}
    background-image: url('{{ background_image }}');
    background-size: cover;
    background-position: center;
    {% endif %}
    font-family: "Geist Mono", "SF Mono", monospace;
    color: var(--text);
    display: flex;
    flex-direction: column;
    padding: 60px;
  }

  .card {
    background: rgba(13, 17, 23, 0.88);
    border-radius: 16px;
    border: 1px solid var(--surface1);
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    backdrop-filter: blur(20px);
  }

  .panic-banner {
    background: rgba(240, 136, 62, 0.15);
    border-bottom: 2px solid var(--orange);
    padding: 24px 40px;
    font-size: 20px;
    color: var(--orange);
    text-transform: uppercase;
    letter-spacing: 3px;
    font-weight: 700;
  }

  .body {
    padding: 48px 40px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 44px;
  }

  .scenario-emoji {
    font-size: 80px;
    line-height: 1;
  }

  .headline {
    font-size: 50px;
    font-weight: 700;
    color: var(--orange);
    line-height: 1.3;
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
  }

  .solution-block {
    background: rgba(63, 185, 80, 0.08);
    border-left: 4px solid var(--green);
    border-radius: 0 12px 12px 0;
    padding: 28px 32px;
  }

  .solution-label {
    font-size: 18px;
    color: var(--green);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
    font-weight: 700;
  }

  .command {
    font-size: 28px;
    color: var(--cyan);
    word-break: break-all;
    line-height: 1.5;
  }

  .caption {
    font-size: 26px;
    color: var(--subtext);
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
    line-height: 1.5;
  }

  .footer {
    padding: 32px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--surface1);
  }

  .brand {
    font-size: 24px;
    color: var(--cyan);
    font-weight: 600;
    letter-spacing: 2px;
  }

  .cta {
    font-size: 20px;
    color: var(--subtext);
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="panic-banner">EVERYDAY CYBER</div>

    <div class="body">
      {% if scenario_emoji %}
      <div class="scenario-emoji">{{ scenario_emoji }}</div>
      {% endif %}

      <div class="headline">{{ headline }}</div>

      {% if command %}
      <div class="solution-block">
        <div class="solution-label">SOLUTION</div>
        <div class="command">{{ command }}</div>
      </div>
      {% endif %}

      {% if caption %}
      <div class="caption">{{ caption }}</div>
      {% endif %}
    </div>

    <div class="footer">
      <span class="brand">ZCYBERNEWS</span>
      <span class="cta">{{ cta }}</span>
    </div>
  </div>
</body>
</html>
