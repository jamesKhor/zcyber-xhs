<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --bg:      #060810;
    --panel:   #0c1020;
    --border:  #1a2238;
    --text:    #eef2ff;
    --dim:     #6a7a9a;
    --indigo:  #818CF8;
    --cyan:    #00C8FF;
    --purple:  #A78BFA;
    --yellow:  #FFD54F;
  }

  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: var(--bg);
    background-image: radial-gradient(circle, rgba(129,140,248,0.05) 1px, transparent 1px);
    background-size: 36px 36px;
    {% if background_image %}
    background-image: url('{{ background_image }}');
    background-size: cover;
    background-position: center;
    {% endif %}
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(6,8,16,0.87) 0%, rgba(6,8,16,0.97) 100%);
    pointer-events: none;
  }

  .top-bar {
    height: 32px;
    background: linear-gradient(90deg, var(--indigo), var(--cyan));
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  /* Header with the debate question */
  .header {
    padding: 44px 72px 32px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    border-bottom: 1.5px solid rgba(129,140,248,0.2);
  }
  .poll-chip {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(129,140,248,0.1);
    border: 1.5px solid rgba(129,140,248,0.35);
    border-radius: 40px;
    padding: 10px 24px;
    margin-bottom: 24px;
  }
  .chip-text {
    font-size: 24px;
    color: var(--indigo);
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .headline {
    font-size: 100px;
    font-weight: 900;
    color: var(--text);
    line-height: 1.05;
    word-break: break-word;
    text-shadow: 0 0 60px rgba(129,140,248,0.2);
  }

  /* VS divider */
  .vs-row {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 28px 72px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }
  .vs-line { flex: 1; height: 1px; background: var(--border); }
  .vs-badge {
    font-size: 36px;
    font-weight: 900;
    color: var(--yellow);
    background: rgba(255,213,79,0.1);
    border: 2px solid rgba(255,213,79,0.3);
    border-radius: 50%;
    width: 72px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: 0;
    font-family: "SF Mono", monospace;
  }

  /* Two option panels */
  .options {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 0 72px;
    gap: 28px;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .option {
    border-radius: 20px;
    padding: 40px 44px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .option-a {
    background: rgba(129,140,248,0.08);
    border: 2px solid rgba(129,140,248,0.35);
  }
  .option-b {
    background: rgba(0,200,255,0.06);
    border: 2px solid rgba(0,200,255,0.28);
  }

  .option-label {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .opt-a-label { color: var(--indigo); }
  .opt-b-label { color: var(--cyan); }

  .option-key {
    font-size: 22px;
    font-weight: 900;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    flex-shrink: 0;
  }
  .key-a { background: rgba(129,140,248,0.2); color: var(--indigo); }
  .key-b { background: rgba(0,200,255,0.15); color: var(--cyan); }

  .option-text {
    font-size: 56px;
    font-weight: 900;
    line-height: 1.15;
    word-break: break-word;
  }
  .opt-a-text { color: var(--indigo); }
  .opt-b-text { color: var(--cyan); }

  /* Vote CTA block */
  .vote-block {
    padding: 0 72px 32px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }
  .vote-instruction {
    font-size: 44px;
    color: var(--yellow);
    font-weight: 700;
    line-height: 1.4;
    text-align: center;
    background: rgba(255,213,79,0.06);
    border: 1.5px solid rgba(255,213,79,0.25);
    border-radius: 16px;
    padding: 28px 32px;
  }

  .footer {
    padding: 28px 72px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1.5px solid var(--border);
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }
  .brand {
    font-size: 38px;
    color: var(--cyan);
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
  }
  .cta {
    font-size: 28px;
    color: var(--cyan);
    background: rgba(0, 200, 255, 0.08);
    border: 1.5px solid rgba(0, 200, 255, 0.25);
    border-radius: 40px;
    padding: 10px 28px;
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
  }
</style>
</head>
<body>
  {% if background_image %}<div class="overlay"></div>{% endif %}

  <div class="top-bar"></div>

  <div class="header">
    <div class="poll-chip">
      <span class="chip-text">RANK WAR · 本周投票</span>
    </div>
    <div class="headline">{{ headline }}</div>
  </div>

  <div class="vs-row">
    <div class="vs-line"></div>
    <div class="vs-badge">VS</div>
    <div class="vs-line"></div>
  </div>

  <div class="options">
    <div class="option option-a">
      <div class="option-label opt-a-label">
        <span class="option-key key-a">A</span>
        {{ before_label | default('选A') }}
      </div>
      <div class="option-text opt-a-text">{{ before_text }}</div>
    </div>

    <div class="option option-b">
      <div class="option-label opt-b-label">
        <span class="option-key key-b">B</span>
        {{ after_label | default('选B') }}
      </div>
      <div class="option-text opt-b-text">{{ after_text }}</div>
    </div>
  </div>

  {% if caption %}
  <div class="vote-block">
    <div class="vote-instruction">{{ caption }}</div>
  </div>
  {% endif %}

  <div class="footer">
    <span class="brand">ZCYBERNEWS</span>
    <span class="cta">{{ cta }}</span>
  </div>
</body>
</html>
