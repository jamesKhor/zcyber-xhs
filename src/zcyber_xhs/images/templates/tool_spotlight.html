<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --base: #000000;
    --surface0: #0d1117;
    --surface1: #161b22;
    --text: #f0f4f8;
    --subtext: #8b949e;
    --cyan: #00B8FF;
    --cyan-bright: #22D3EE;
    --indigo: #6366F1;
    --green: #3fb950;
  }

  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: var(--base);
    {% if background_image %}
    background-image: url('{{ background_image }}');
    background-size: cover;
    background-position: center;
    {% endif %}
    font-family: "Geist Mono", "SF Mono", monospace;
    color: var(--text);
    display: flex;
    flex-direction: column;
    padding: 60px;
  }

  .card {
    background: rgba(13, 17, 23, 0.88);
    border-radius: 16px;
    border: 1px solid var(--surface1);
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    backdrop-filter: blur(20px);
  }

  .header {
    padding: 40px 40px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .slide-indicator {
    font-size: 20px;
    color: var(--subtext);
    background: var(--surface1);
    padding: 6px 16px;
    border-radius: 20px;
  }

  .tool-badge {
    font-size: 24px;
    color: var(--cyan);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 3px;
  }

  .body {
    padding: 30px 40px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 36px;
  }

  .use-number {
    font-size: 120px;
    font-weight: 700;
    color: var(--indigo);
    opacity: 0.3;
    line-height: 1;
  }

  .use-title {
    font-size: 48px;
    font-weight: 700;
    color: var(--cyan-bright);
    line-height: 1.3;
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
    margin-top: -40px;
  }

  .command-block {
    background: var(--surface0);
    border: 1px solid var(--surface1);
    border-radius: 12px;
    padding: 24px 28px;
  }

  .prompt-line {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .prompt-symbol {
    color: var(--green);
    font-size: 28px;
    font-weight: 700;
  }

  .command {
    font-size: 26px;
    color: var(--cyan);
    word-break: break-all;
    line-height: 1.4;
  }

  .caption {
    font-size: 26px;
    color: var(--subtext);
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
    line-height: 1.5;
  }

  .footer {
    padding: 32px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--surface1);
  }

  .brand {
    font-size: 24px;
    color: var(--cyan);
    font-weight: 600;
    letter-spacing: 2px;
  }

  .cta {
    font-size: 20px;
    color: var(--subtext);
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <span class="tool-badge">{{ tool_name }}</span>
      <span class="slide-indicator">{{ slide_number | default('1') }} / {{ total_slides | default('5') }}</span>
    </div>

    <div class="body">
      <div class="use-number">#{{ use_number | default(slide_number | default('1')) }}</div>
      <div class="use-title">{{ use_title | default(headline) }}</div>

      {% if command %}
      <div class="command-block">
        <div class="prompt-line">
          <span class="prompt-symbol">$</span>
          <span class="command">{{ command }}</span>
        </div>
      </div>
      {% endif %}

      {% if caption %}
      <div class="caption">{{ caption }}</div>
      {% endif %}
    </div>

    <div class="footer">
      <span class="brand">ZCYBERNEWS</span>
      <span class="cta">{{ cta }}</span>
    </div>
  </div>
</body>
</html>
