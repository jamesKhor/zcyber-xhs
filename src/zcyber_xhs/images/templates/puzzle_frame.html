<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --bg:    #001a08;
    --panel: #00250d;
    --border:#005020;
    --text:  #e8fff0;
    --dim:   #6a9a7a;
    --green: #00E676;
    --cyan:  #00C8FF;
    --yellow:#FFD54F;
    --indigo:#818CF8;
  }

  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: var(--bg);
    background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 36px 36px;
    {% if background_image %}
    background-image: url('{{ background_image }}');
    background-size: cover;
    background-position: center;
    {% endif %}
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,26,8,0.82) 0%, rgba(0,26,8,0.95) 100%);
    pointer-events: none;
  }

  .top-bar {
    height: 32px;
    background: linear-gradient(90deg, var(--green), #00BFA5);
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .header {
    padding: 28px 72px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    border-bottom: 1.5px solid rgba(0,230,118,0.2);
  }
  .ctf-label {
    font-size: 28px;
    color: var(--green);
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
  }
  .diff-badge {
    font-size: 22px;
    padding: 8px 20px;
    border-radius: 8px;
    font-weight: 700;
    background: rgba(129,140,248,0.15);
    color: var(--indigo);
    border: 1.5px solid rgba(129,140,248,0.4);
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 44px 72px;
    gap: 44px;
    position: relative;
    z-index: 1;
  }

  .headline {
    font-size: 100px;
    font-weight: 900;
    color: var(--green);
    line-height: 1.1;
    word-break: break-word;
    text-shadow: 0 0 80px rgba(0,230,118,0.2);
  }

  /* The actual puzzle */
  .puzzle-box {
    background: var(--panel);
    border: 2px dashed var(--green);
    border-radius: 20px;
    padding: 44px 40px;
    text-align: center;
  }
  .puzzle-string {
    font-size: 72px;
    color: var(--cyan);
    word-break: break-all;
    line-height: 1.5;
    letter-spacing: 4px;
    font-family: "SF Mono", "Fira Code", monospace;
    font-weight: 700;
  }

  .hint-block {
    background: rgba(255,213,79,0.08);
    border-left: 6px solid var(--yellow);
    border-radius: 0 14px 14px 0;
    padding: 24px 30px;
  }
  .hint-label {
    font-size: 22px;
    color: var(--yellow);
    text-transform: uppercase;
    letter-spacing: 4px;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .hint-text {
    font-size: 44px;
    color: var(--dim);
    line-height: 1.4;
  }

  .engagement-text {
    font-size: 52px;
    color: var(--yellow);
    font-weight: 700;
    line-height: 1.4;
    text-align: center;
  }

  .footer {
    padding: 30px 72px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1.5px solid var(--border);
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }
  .brand {
    font-size: 38px;
    color: var(--cyan);
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
  }
  .cta {
    font-size: 30px;
    color: var(--green);
    background: rgba(0, 230, 118, 0.08);
    border: 1.5px solid rgba(0, 230, 118, 0.25);
    border-radius: 40px;
    padding: 10px 28px;
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
  }
</style>
</head>
<body>
  {% if background_image %}<div class="overlay"></div>{% endif %}

  <div class="top-bar"></div>

  <div class="header">
    <span class="ctf-label">CTF CHALLENGE</span>
    {% if difficulty %}<span class="diff-badge">{{ difficulty }}</span>{% endif %}
  </div>

  <div class="main">
    <div class="headline">{{ headline }}</div>

    {% if puzzle_string %}
    <div class="puzzle-box">
      <div class="puzzle-string">{{ puzzle_string }}</div>
    </div>
    {% endif %}

    {% if hint %}
    <div class="hint-block">
      <div class="hint-label">HINT</div>
      <div class="hint-text">{{ hint }}</div>
    </div>
    {% endif %}

    {% if engagement_cta %}
    <div class="engagement-text">{{ engagement_cta }}</div>
    {% endif %}
  </div>

  <div class="footer">
    <span class="brand">ZCYBERNEWS</span>
    <span class="cta">{{ cta }}</span>
  </div>
</body>
</html>
