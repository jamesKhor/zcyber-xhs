<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --base: #000000;
    --surface0: #0d1117;
    --surface1: #161b22;
    --text: #f0f4f8;
    --subtext: #8b949e;
    --cyan: #00B8FF;
    --green: #3fb950;
    --green-dim: rgba(63, 185, 80, 0.15);
    --indigo: #6366F1;
    --yellow: #d29922;
  }

  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: var(--base);
    {% if background_image %}
    background-image: url('{{ background_image }}');
    background-size: cover;
    background-position: center;
    {% endif %}
    font-family: "Geist Mono", "SF Mono", monospace;
    color: var(--text);
    display: flex;
    flex-direction: column;
    padding: 60px;
  }

  .card {
    background: rgba(13, 17, 23, 0.88);
    border-radius: 16px;
    border: 1px solid var(--green);
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    backdrop-filter: blur(20px);
  }

  .challenge-bar {
    background: var(--green-dim);
    border-bottom: 2px solid var(--green);
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .challenge-label {
    font-size: 22px;
    color: var(--green);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 4px;
  }

  .difficulty-badge {
    font-size: 16px;
    padding: 6px 14px;
    border-radius: 6px;
    font-weight: 700;
    background: rgba(99, 102, 241, 0.2);
    color: var(--indigo);
    border: 1px solid var(--indigo);
  }

  .body {
    padding: 48px 40px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 40px;
  }

  .headline {
    font-size: 44px;
    font-weight: 700;
    color: var(--green);
    line-height: 1.3;
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
  }

  .puzzle-box {
    background: var(--surface0);
    border: 2px dashed var(--green);
    border-radius: 12px;
    padding: 36px 32px;
    text-align: center;
  }

  .puzzle-string {
    font-size: 34px;
    color: var(--cyan);
    word-break: break-all;
    line-height: 1.6;
    letter-spacing: 2px;
  }

  .hint-block {
    background: rgba(210, 153, 34, 0.08);
    border-left: 4px solid var(--yellow);
    border-radius: 0 10px 10px 0;
    padding: 20px 24px;
  }

  .hint-label {
    font-size: 16px;
    color: var(--yellow);
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .hint-text {
    font-size: 24px;
    color: var(--subtext);
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
  }

  .engagement {
    text-align: center;
    padding: 24px 0;
  }

  .engagement-text {
    font-size: 30px;
    color: var(--yellow);
    font-weight: 700;
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
    line-height: 1.5;
  }

  .footer {
    padding: 32px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--surface1);
  }

  .brand {
    font-size: 24px;
    color: var(--cyan);
    font-weight: 600;
    letter-spacing: 2px;
  }

  .cta {
    font-size: 20px;
    color: var(--subtext);
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="challenge-bar">
      <span class="challenge-label">CTF CHALLENGE</span>
      {% if difficulty %}
      <span class="difficulty-badge">{{ difficulty }}</span>
      {% endif %}
    </div>

    <div class="body">
      <div class="headline">{{ headline }}</div>

      {% if puzzle_string %}
      <div class="puzzle-box">
        <div class="puzzle-string">{{ puzzle_string }}</div>
      </div>
      {% endif %}

      {% if hint %}
      <div class="hint-block">
        <div class="hint-label">HINT</div>
        <div class="hint-text">{{ hint }}</div>
      </div>
      {% endif %}

      {% if engagement_cta %}
      <div class="engagement">
        <div class="engagement-text">{{ engagement_cta }}</div>
      </div>
      {% endif %}
    </div>

    <div class="footer">
      <span class="brand">ZCYBERNEWS</span>
      <span class="cta">{{ cta }}</span>
    </div>
  </div>
</body>
</html>
