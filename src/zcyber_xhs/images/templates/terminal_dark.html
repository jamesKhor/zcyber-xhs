<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  /* zcybernews brand palette — aligned with zcybernews dark theme */
  :root {
    --base: #000000;            /* OLED black — matches zcybernews dark bg */
    --surface0: #0d1117;        /* Dark navy — from OG gradient */
    --surface1: #161b22;        /* Slightly lighter navy for chrome */
    --surface2: #1c2333;        /* Card/panel backgrounds */
    --text: #f0f4f8;            /* hsl(210, 40%, 96%) — zcybernews foreground */
    --subtext: #8b949e;         /* Muted text */
    --cyan: #00B8FF;            /* zcybernews dark primary */
    --cyan-bright: #22D3EE;     /* OG accent cyan */
    --indigo: #6366F1;          /* OG accent indigo */
    --green: #3fb950;           /* Terminal green — success */
    --red: #f85149;             /* Destructive / severity critical */
    --orange: #f0883e;          /* Severity high */
    --yellow: #d29922;          /* Severity medium / warnings */
  }

  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: var(--base);
    font-family: "Geist Mono", "SF Mono", "JetBrains Mono", "Fira Code", monospace;
    color: var(--text);
    display: flex;
    flex-direction: column;
    padding: 60px;
  }

  /* ── Terminal window chrome ── */
  .terminal {
    background: var(--surface0);
    border-radius: 16px;
    border: 1px solid var(--surface1);
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .terminal-bar {
    height: 52px;
    background: var(--surface1);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 10px;
  }

  .dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
  }
  .dot-red { background: var(--red); }
  .dot-yellow { background: var(--yellow); }
  .dot-green { background: var(--green); }

  .terminal-title {
    color: var(--subtext);
    font-size: 18px;
    margin-left: 12px;
  }

  /* ── Content area ── */
  .terminal-body {
    padding: 48px 40px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 40px;
  }

  .headline {
    font-size: 52px;
    font-weight: 700;
    color: var(--cyan-bright);
    line-height: 1.3;
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
  }

  .prompt-line {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .prompt-symbol {
    color: var(--green);
    font-size: 32px;
    font-weight: 700;
    flex-shrink: 0;
    line-height: 1.4;
  }

  .command {
    font-size: 30px;
    color: var(--cyan);
    word-break: break-all;
    line-height: 1.4;
  }

  .output {
    font-size: 24px;
    color: var(--subtext);
    padding-left: 44px;
    line-height: 1.6;
    white-space: pre-wrap;
  }

  .caption {
    font-size: 28px;
    color: var(--indigo);
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
    padding-left: 44px;
    margin-top: -10px;
  }

  /* ── Safety disclaimer ── */
  .disclaimer {
    font-size: 20px;
    color: var(--yellow);
    padding: 16px 40px;
    opacity: 0.8;
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
  }

  /* ── Footer ── */
  .footer {
    padding: 32px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--surface1);
    background: var(--surface0);
  }

  .brand {
    font-size: 26px;
    color: var(--cyan);
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .cta {
    font-size: 22px;
    color: var(--subtext);
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
  }
</style>
</head>
<body>
  <div class="terminal">
    <div class="terminal-bar">
      <div class="dot dot-red"></div>
      <div class="dot dot-yellow"></div>
      <div class="dot dot-green"></div>
      <span class="terminal-title">zcybernews@terminal</span>
    </div>

    <div class="terminal-body">
      <div class="headline">{{ headline }}</div>

      <div class="prompt-line">
        <span class="prompt-symbol">$</span>
        <span class="command">{{ command }}</span>
      </div>

      {% if output_preview %}
      <div class="output">{{ output_preview }}</div>
      {% endif %}

      {% if caption %}
      <div class="caption">{{ caption }}</div>
      {% endif %}
    </div>

    {% if safety_disclaimer %}
    <div class="disclaimer">{{ safety_disclaimer }}</div>
    {% endif %}

    <div class="footer">
      <span class="brand">ZCYBERNEWS</span>
      <span class="cta">{{ cta }}</span>
    </div>
  </div>
</body>
</html>
