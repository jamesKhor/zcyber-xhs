<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --bg:     #0a0e1a;
    --panel:  #111827;
    --border: #1f2d3d;
    --text:   #f0f6ff;
    --dim:    #7c8fa6;
    --cyan:   #00C8FF;
    --green:  #00E676;
    --indigo: #818CF8;
    --yellow: #FFD54F;
    --red:    #FF5252;
  }

  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: var(--bg);
    background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 36px 36px;
    font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  /* ── TOP accent bar ── */
  .top-bar {
    height: 32px;
    background: linear-gradient(90deg, var(--cyan), var(--indigo));
    flex-shrink: 0;
  }

  /* ── Main content area ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 72px;
    gap: 52px;
  }

  /* Category chip */
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: rgba(0, 200, 255, 0.12);
    border: 1.5px solid rgba(0, 200, 255, 0.35);
    border-radius: 40px;
    padding: 12px 28px;
    width: fit-content;
  }
  .chip-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--cyan);
  }
  .chip-label {
    font-size: 28px;
    color: var(--cyan);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 700;
  }

  /* BIG headline — the scroll-stopper */
  .headline {
    font-size: 140px;
    font-weight: 900;
    color: var(--text);
    line-height: 1.05;
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
    word-break: break-word;
    /* cyan accent on first line via text-shadow glow */
    text-shadow: 0 0 80px rgba(0,200,255,0.25);
  }

  /* Terminal command block */
  .cmd-block {
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-left: 5px solid var(--cyan);
    border-radius: 16px;
    padding: 32px 36px;
    display: flex;
    align-items: flex-start;
    gap: 20px;
  }
  .prompt {
    color: var(--green);
    font-size: 52px;
    line-height: 1.3;
    flex-shrink: 0;
    font-weight: 700;
  }
  .cmd-text {
    font-size: 50px;
    color: var(--cyan);
    line-height: 1.35;
    word-break: break-all;
  }

  /* Caption / result */
  .caption {
    font-size: 48px;
    color: var(--dim);
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
    line-height: 1.4;
    padding-left: 8px;
    border-left: 4px solid var(--indigo);
  }

  /* ── Disclaimer ── */
  .disclaimer {
    font-size: 30px;
    color: var(--yellow);
    padding: 0 72px 28px;
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
    flex-shrink: 0;
  }

  /* ── Footer ── */
  .footer {
    padding: 32px 72px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1.5px solid var(--border);
    flex-shrink: 0;
  }
  .brand {
    font-size: 38px;
    color: var(--cyan);
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
  }
  .cta {
    font-size: 30px;
    color: var(--cyan);
    background: rgba(0, 200, 255, 0.08);
    border: 1.5px solid rgba(0, 200, 255, 0.25);
    border-radius: 40px;
    padding: 10px 28px;
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
  }
</style>
</head>
<body>
  <div class="top-bar"></div>

  <div class="main">
    <div class="chip">
      <div class="chip-dot"></div>
      <span class="chip-label">COMMAND TIP</span>
    </div>

    <div class="headline">{{ headline }}</div>

    <div class="cmd-block">
      <span class="prompt">$</span>
      <span class="cmd-text">{{ command }}</span>
    </div>

    {% if caption %}
    <div class="caption">{{ caption }}</div>
    {% endif %}
  </div>

  {% if safety_disclaimer %}
  <div class="disclaimer">⚠️ {{ safety_disclaimer }}</div>
  {% endif %}

  <div class="footer">
    <span class="brand">ZCYBERNEWS</span>
    <span class="cta">{{ cta }}</span>
  </div>
</body>
</html>
