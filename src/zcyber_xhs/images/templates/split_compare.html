<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --bg:    #050a05;
    --text:  #f0fff4;
    --dim:   #7a9a7a;
    --red:   #FF5252;
    --green: #00E676;
    --cyan:  #00C8FF;
    --panel-red:   rgba(255,82,82,0.08);
    --panel-green: rgba(0,230,118,0.08);
    --border-red:   rgba(255,82,82,0.25);
    --border-green: rgba(0,230,118,0.25);
  }

  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: var(--bg);
    {% if background_image %}
    background-image: url('{{ background_image }}');
    background-size: cover;
    background-position: center;
    {% endif %}
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(5,10,5,0.88);
    pointer-events: none;
  }

  .top-bar {
    height: 32px;
    background: linear-gradient(90deg, var(--red) 0%, var(--green) 100%);
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  /* Topic header */
  .header {
    padding: 40px 72px 32px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    border-bottom: 1.5px solid rgba(255,255,255,0.08);
  }
  .headline {
    font-size: 120px;
    font-weight: 900;
    color: var(--text);
    line-height: 1.1;
    word-break: break-word;
  }

  /* Two halves */
  .split-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
  }

  .half {
    flex: 1;
    padding: 44px 72px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 24px;
  }

  .half-wrong {
    background: var(--panel-red);
    border-bottom: 2px solid var(--border-red);
  }
  .half-right {
    background: var(--panel-green);
  }

  .half-label {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
  }
  .label-wrong { color: var(--red); }
  .label-right { color: var(--green); }

  .half-text {
    font-size: 72px;
    font-weight: 900;
    line-height: 1.15;
    word-break: break-word;
  }
  .text-wrong { color: var(--red); }
  .text-right { color: var(--green); }

  .half-code {
    font-size: 38px;
    color: var(--cyan);
    background: rgba(0,0,0,0.4);
    border-radius: 12px;
    padding: 18px 24px;
    word-break: break-all;
    line-height: 1.4;
    font-family: "SF Mono", "Fira Code", monospace;
  }

  .footer {
    padding: 30px 72px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1.5px solid rgba(255,255,255,0.08);
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }
  .brand {
    font-size: 38px;
    color: var(--cyan);
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
  }
  .cta {
    font-size: 30px;
    color: var(--cyan);
    background: rgba(0, 200, 255, 0.08);
    border: 1.5px solid rgba(0, 200, 255, 0.25);
    border-radius: 40px;
    padding: 10px 28px;
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
  }
</style>
</head>
<body>
  {% if background_image %}<div class="overlay"></div>{% endif %}

  <div class="top-bar"></div>

  <div class="header">
    <div class="headline">{{ headline }}</div>
  </div>

  <div class="split-container">
    <div class="half half-wrong">
      <div class="half-label label-wrong">✗ {{ before_label | default('WRONG') }}</div>
      <div class="half-text text-wrong">{{ before_text }}</div>
      {% if command %}
      <div class="half-code" style="opacity:0.55; text-decoration: line-through;">{{ command }}</div>
      {% endif %}
    </div>

    <div class="half half-right">
      <div class="half-label label-right">✓ {{ after_label | default('RIGHT') }}</div>
      <div class="half-text text-right">{{ after_text }}</div>
      {% if caption %}
      <div class="half-code">{{ caption }}</div>
      {% endif %}
    </div>
  </div>

  <div class="footer">
    <span class="brand">ZCYBERNEWS</span>
    <span class="cta">{{ cta }}</span>
  </div>
</body>
</html>
