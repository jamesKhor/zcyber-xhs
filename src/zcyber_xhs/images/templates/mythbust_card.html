<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --base: #000000;
    --surface0: #0d1117;
    --surface1: #161b22;
    --text: #f0f4f8;
    --subtext: #8b949e;
    --cyan: #00B8FF;
    --cyan-bright: #22D3EE;
    --red: #f85149;
    --green: #3fb950;
  }

  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: var(--base);
    {% if background_image %}
    background-image: url('{{ background_image }}');
    background-size: cover;
    background-position: center;
    {% endif %}
    font-family: "Geist Mono", "SF Mono", monospace;
    color: var(--text);
    display: flex;
    flex-direction: column;
    padding: 60px;
  }

  .card {
    background: rgba(13, 17, 23, 0.88);
    border-radius: 16px;
    border: 1px solid var(--surface1);
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    backdrop-filter: blur(20px);
  }

  .myth-banner {
    background: rgba(248, 81, 73, 0.10);
    border-bottom: 2px solid var(--red);
    padding: 20px 40px;
    font-size: 22px;
    color: var(--red);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 4px;
  }

  .body {
    padding: 48px 40px;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 48px;
  }

  .myth-section {
    position: relative;
  }

  .myth-label {
    font-size: 18px;
    color: var(--red);
    text-transform: uppercase;
    letter-spacing: 3px;
    font-weight: 700;
    margin-bottom: 16px;
  }

  .myth-text {
    font-size: 42px;
    font-weight: 700;
    color: var(--subtext);
    line-height: 1.3;
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
    text-decoration: line-through;
    text-decoration-color: var(--red);
    text-decoration-thickness: 3px;
  }

  .divider {
    height: 2px;
    background: linear-gradient(90deg, var(--red), transparent 30%, transparent 70%, var(--green));
  }

  .truth-section {
    position: relative;
  }

  .truth-label {
    font-size: 18px;
    color: var(--green);
    text-transform: uppercase;
    letter-spacing: 3px;
    font-weight: 700;
    margin-bottom: 16px;
  }

  .truth-text {
    font-size: 42px;
    font-weight: 700;
    color: var(--cyan-bright);
    line-height: 1.3;
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
  }

  .caption {
    font-size: 24px;
    color: var(--subtext);
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
    line-height: 1.5;
  }

  .footer {
    padding: 32px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--surface1);
  }

  .brand {
    font-size: 24px;
    color: var(--cyan);
    font-weight: 600;
    letter-spacing: 2px;
  }

  .cta {
    font-size: 20px;
    color: var(--subtext);
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="myth-banner">MYTH BUSTED</div>

    <div class="body">
      <div class="myth-section">
        <div class="myth-label">MYTH</div>
        <div class="myth-text">{{ myth | default(headline) }}</div>
      </div>

      <div class="divider"></div>

      <div class="truth-section">
        <div class="truth-label">TRUTH</div>
        <div class="truth-text">{{ truth | default(caption) }}</div>
      </div>

      {% if caption and truth %}
      <div class="caption">{{ caption }}</div>
      {% endif %}
    </div>

    <div class="footer">
      <span class="brand">ZCYBERNEWS</span>
      <span class="cta">{{ cta }}</span>
    </div>
  </div>
</body>
</html>
