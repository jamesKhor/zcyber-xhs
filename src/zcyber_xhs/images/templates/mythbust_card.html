<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  :root {
    --bg:       #0d0000;
    --panel:    #160000;
    --border:   #2a0000;
    --text:     #fff0f0;
    --dim:      #9a7a7a;
    --red:      #FF5252;
    --green:    #00E676;
    --cyan:     #00C8FF;
    --cyan-b:   #22D3EE;
  }

  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: var(--bg);
    {% if background_image %}
    background-image: url('{{ background_image }}');
    background-size: cover;
    background-position: center;
    {% endif %}
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
    color: var(--text);
    display: flex;
    flex-direction: column;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(13,0,0,0.80) 0%, rgba(13,0,0,0.95) 100%);
    pointer-events: none;
  }

  .top-bar {
    height: 32px;
    background: linear-gradient(90deg, var(--red), #FF1744);
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 52px 72px;
    gap: 44px;
    position: relative;
    z-index: 1;
  }

  /* MYTH section */
  .section-label {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .label-myth  { color: var(--red); }
  .label-truth { color: var(--green); }

  .myth-text {
    font-size: 100px;
    font-weight: 900;
    color: var(--dim);
    line-height: 1.1;
    text-decoration: line-through;
    text-decoration-color: var(--red);
    text-decoration-thickness: 6px;
    word-break: break-word;
  }

  /* Divider arrow */
  .divider {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
  }
  .div-line {
    flex: 1;
    height: 2px;
    background: linear-gradient(90deg, var(--red) 0%, var(--green) 100%);
  }
  .div-arrow {
    font-size: 52px;
    line-height: 1;
  }

  .truth-text {
    font-size: 100px;
    font-weight: 900;
    color: var(--cyan-b);
    line-height: 1.1;
    word-break: break-word;
    text-shadow: 0 0 60px rgba(34,211,238,0.2);
  }

  .caption {
    font-size: 44px;
    color: var(--dim);
    line-height: 1.4;
  }

  .footer {
    padding: 32px 72px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1.5px solid var(--border);
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }
  .brand {
    font-size: 38px;
    color: var(--cyan);
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
  }
  .cta {
    font-size: 30px;
    color: var(--cyan);
    background: rgba(0, 200, 255, 0.08);
    border: 1.5px solid rgba(0, 200, 255, 0.25);
    border-radius: 40px;
    padding: 10px 28px;
    font-family: "Noto Sans SC", "PingFang SC", sans-serif;
  }
</style>
</head>
<body>
  {% if background_image %}<div class="overlay"></div>{% endif %}

  <div class="top-bar"></div>

  <div class="main">
    <div>
      <div class="section-label label-myth">MYTH ✗</div>
      <div class="myth-text">{{ myth | default(headline) }}</div>
    </div>

    <div class="divider">
      <div class="div-line"></div>
      <div class="div-arrow">👇</div>
      <div class="div-line"></div>
    </div>

    <div>
      <div class="section-label label-truth">TRUTH ✓</div>
      <div class="truth-text">{{ truth | default(caption) }}</div>
    </div>

    {% if caption and truth %}
    <div class="caption">{{ caption }}</div>
    {% endif %}
  </div>

  <div class="footer">
    <span class="brand">ZCYBERNEWS</span>
    <span class="cta">{{ cta }}</span>
  </div>
</body>
</html>
