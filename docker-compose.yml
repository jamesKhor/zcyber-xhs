services:
  scheduler:
    build: .
    env_file: .env
    volumes:
      - ./output:/app/output
      - ./config:/app/config
    restart: unless-stopped
    command: ["run"]

  telegram-bot:
    build: .
    env_file: .env
    volumes:
      - ./output:/app/output
      - ./config:/app/config
    restart: unless-stopped
    command: ["bot"]

  # One-off commands:
  # docker compose run scheduler generate -a problem_command
  # docker compose run scheduler queue list
  # docker compose run scheduler status
